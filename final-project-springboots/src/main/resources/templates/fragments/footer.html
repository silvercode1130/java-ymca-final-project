<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="footer">

  <footer class="border-t border-gray-700 bg-black mt-auto">
    <div class="mx-auto max-w-7xl px-4 py-12">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <!-- Brand -->
        <div class="col-span-1 text-left">
          <a th:href="@{/}" class="flex items-center gap-3 mb-3">
            <!-- 로고 이미지 있으면 아래 src 교체 -->
            <span class="text-white text-sm font-semibold">pickQ</span>
          </a>
          <p class="text-xs text-gray-400 mb-2">
            스포츠 용품 전문 역경매 플랫폼
          </p>
          <p class="text-xs text-gray-500 mb-4">
            당신을 위한 모든 제안, pickQ
          </p>
        </div>

        <!-- 서비스 -->
        <div class="text-right">
          <h4 class="font-semibold text-white mb-3 text-sm">서비스</h4>
          <ul class="space-y-1.5 text-xs text-gray-400">
            <li>
              <a href="#" class="hover:text-[#AFFF00] transition-colors">구매 요청</a>
            </li>
            <li>
              <a href="#" class="hover:text-[#AFFF00] transition-colors">요청 등록</a>
            </li>
            <li>
              <a th:href="@{/boards}" class="hover:text-[#AFFF00] transition-colors">커뮤니티</a>
            </li>
          </ul>
        </div>

        <!-- 고객지원 -->
        <div class="text-right">
          <h4 class="font-semibold text-white mb-3 text-sm">고객지원</h4>
          <ul class="space-y-1.5 text-xs text-gray-400">
            <li><a href="#" class="hover:text-[#AFFF00] transition-colors">이용안내</a></li>
            <li><a href="#" class="hover:text-[#AFFF00] transition-colors">자주 묻는 질문</a></li>
            <li><a href="#" class="hover:text-[#AFFF00] transition-colors">고객문의</a></li>
          </ul>
        </div>

        <!-- 회사정보 -->
        <div class="text-right">
          <h4 class="font-semibold text-white mb-3 text-sm">회사정보</h4>
          <ul class="space-y-1.5 text-xs text-gray-400">
            <li><a href="#" class="hover:text-[#AFFF00] transition-colors">회사소개</a></li>
            <li><a href="#" class="hover:text-[#AFFF00] transition-colors">광고/제휴 문의</a></li>
            <li><a href="#" class="hover:text-[#AFFF00] transition-colors">이용약관</a></li>
            <li><a href="#" class="hover:text-[#AFFF00] transition-colors">개인정보처리방침</a></li>
          </ul>
        </div>
      </div>

      <div class="mt-6 pt-6 border-t border-gray-800 text-center text-xs text-gray-500">
        © 2026 pickQ. All rights reserved.
      </div>
    </div>
  </footer>

</th:block>
</body>
</html>
