<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickQ</title>

<!-- Bootstrap -->
<link th:href="@{/bootstrap/bootstrap.min.css}" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Tailwind (테스트용) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    corePlugins: {
      preflight: false  // Tailwind reset이 기존 스타일 덮어쓰는 것 방지
    }
  }
</script>

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/formcheck.js}"></script>
</head>
<body>
	<div class="container">

		<!-- header -->
		<div th:replace="~{fragments/header :: header}"></div>

		<script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>

		<!-- content : 요청마다 교체되는 부분 -->
		<div layout:fragment="content"></div>

		<!-- footer -->
		<div th:replace="~{fragments/footer :: footer}"></div>

	</div>
</body>
</html>
