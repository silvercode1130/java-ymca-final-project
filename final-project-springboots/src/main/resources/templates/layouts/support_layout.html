<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickQ - 고객지원</title>

<!-- Bootstrap -->
<link th:href="@{/bootstrap/bootstrap.min.css}" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Tailwind (테스트용) -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>
<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/formcheck.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/chatPopup.js}" defer></script>
</head>
<body>
	<div class="container">

		<!-- header -->
		<div th:replace="~{fragments/header :: header}"></div>

		<script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>

		<!-- 공통 고객지원 레이아웃 -->
		<div class="min-h-screen bg-[#ffffff]">
			<div class="mx-auto max-w-[1200px] px-4 sm:px-6 py-8">

				<!-- 페이지 타이틀 -->
				<div class="mb-8">
					<h1 class="text-2xl sm:text-3xl font-bold text-[#222222] mb-2">고객지원</h1>
					<p class="text-sm text-[#767676]"></p>
				</div>

				<div class="grid grid-cols-1 lg:grid-cols-4 gap-6 lg:gap-8">
					<!-- Left Sidebar - Menu -->
					<aside class="lg:col-span-1">
						<div class="lg:w-64 flex-shrink-0">
							<div class="bg-white border border-gray-100 sticky top-24">

								<!-- 헤더 -->
								<div class="px-4 py-3 border-b border-gray-100">
									<h3 class="font-semibold text-[#222222]">카테고리</h3>
								</div>

								<!-- 내비게이션 -->
								<nav class="flex flex-col px-2 py-2 text-sm">
									<!-- 이용안내 -->
									<a th:href="@{/support/guide}"
										class="px-4 py-3 rounded flex items-center gap-2 transition-colors"
										th:classappend="${activeSupportMenu == 'guide'} ?
                                   ' bg-gray-100 text-[#222222] font-semibold'
                                   : ' text-[#767676] font-semibold hover:bg-gray-50 hover:text-[#222222]'">
										<i class="bi bi-book me-1 text-[0.9rem]"></i> <span>이용안내</span>
									</a>

									<!-- 자주 묻는 질문 -->
									<a th:href="@{/support/faq}"
										class="px-4 py-3 rounded flex items-center gap-2 transition-colors"
										th:classappend="${activeSupportMenu == 'faq'} ?
                                   ' bg-gray-100 text-[#222222] font-semibold'
                                   : ' text-[#767676] font-semibold hover:bg-gray-50 hover:text-[#222222]'">
										<i class="bi bi-question-circle me-1 text-[0.9rem]"></i> <span>자주
											묻는 질문</span>
									</a>

									<!-- 고객문의 -->
									<a th:href="@{/support/inquiry}"
										class="px-4 py-3 rounded flex items-center gap-2 transition-colors"
										th:classappend="${activeSupportMenu == 'inquiry'} ?
                                   ' bg-gray-100 text-[#222222] font-semibold'
                                   : ' text-[#767676] font-semibold hover:bg-gray-50 hover:text-[#222222]'">
										<i class="bi bi-chat-dots me-1 text-[0.9rem]"></i> <span>고객문의</span>
									</a>
								</nav>

								<!-- Contact Info -->
								<div class="px-4 pb-4 pt-3 border-t border-gray-100">
									<h3 class="mb-2 text-xs font-semibold text-[#222222]">문의하기</h3>
									<div class="space-y-2 text-xs text-[#767676]">
										<div>
											<p>📧 이메일</p>
											<p class="text-[#7CBD00] font-medium">support@pickq.com</p>
										</div>
										<div class="mt-3">
											<p>📞 고객센터</p>
											<p class="text-[#7CBD00] font-medium">1588-0000</p>
											<p class="text-[11px] text-[#999999]">평일 09:00 - 18:00</p>
										</div>
									</div>
								</div>

							</div>
						</div>
					</aside>

					<!-- 오른쪽 영역: 각 고객지원 페이지에서 채워 넣는 부분 -->
					<main class="lg:col-span-3" layout:fragment="content">
						<!-- 개별 페이지에서 오버라이드 -->
					</main>
				</div>
			</div>
		</div>

		<!-- footer -->
		<div class="mt-10"></div>
		<div th:replace="~{fragments/footer :: footer}"></div>

	</div>
	<!-- floating-buttons -->
	<div th:replace="fragments/floating-buttons :: floating-buttons"></div>
</body>
</html>
