<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickQ - 마이페이지</title>

<!-- Bootstrap -->
<link th:href="@{/bootstrap/bootstrap.min.css}" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Tailwind (테스트용) -->
<script src="https://cdn.tailwindcss.com"></script>
<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/formcheck.js}"></script>
</head>
<body>
	<div class="container">

		<!-- header -->
		<div th:replace="~{fragments/header :: header}"></div>

		<script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>

		<!-- 공통 마이페이지 레이아웃 -->
		<div class="min-h-screen bg-white">
			<div class="mx-auto max-w-[1200px] px-4 sm:px-6 py-8">
				<div class="mb-8">
					<h1 class="text-2xl sm:text-3xl font-bold text-[#222222] mb-2">마이페이지</h1>
					<p class="text-xs sm:text-sm text-[#767676]">내 정보와 활동 내역을 관리하세요</p>
				</div>

				<div class="grid grid-cols-1 lg:grid-cols-4 gap-6 lg:gap-8">
					<!-- 공통 사이드바 -->
					<aside class="lg:col-span-1">
						<div
							class="bg-white border border-gray-100 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] sticky top-24">

							<!-- MY 경매 -->
							<div class="px-4 py-3 border-b border-gray-100">
								<h3
									class="text-[11px] font-semibold tracking-[0.06em] text-[#8C8F95]">MY
									경매</h3>
							</div>
							<div class="px-2 py-2 space-y-1">
								<a th:href="@{/mypage/auctions}"
									class="w-full inline-flex items-center rounded-lg px-3 py-3 text-[15px] font-semibold transition-colors"
									th:classappend="${activeMenu == 'myAuctions'} ?
                                  ' bg-gray-100 text-[#222222]' :
                                  ' text-[#767676] hover:bg-gray-50 hover:text-[#222222]'">
									<span
									class="mr-2 inline-flex h-6 w-6 items-center justify-center rounded-md border border-[#222222]">
										<span
										class="block h-3 w-3 rounded-[3px] border border-[#222222]"></span>
								</span> <span>나의 경매 목록</span>
								</a> <a th:href="@{/mypage/bids}"
									class="w-full inline-flex items-center rounded-lg px-3 py-3 text-[15px] transition-colors"
									th:classappend="${activeMenu == 'myBids'} ?
                                  ' bg-gray-100 text-[#222222]' :
                                  ' text-[#767676] hover:bg-gray-50 hover:text-[#222222]'">
									<span
									class="mr-2 inline-flex h-6 w-6 items-center justify-center rounded-md border border-[#C5C7CE]">
										<span
										class="block h-3 w-3 border-l-2 border-b-2 border-[#7C7F88] rotate-[-35deg] translate-x-[1px]"></span>
								</span> <span>나의 입찰 목록</span>
								</a>
							</div>

							<!-- MY 활동 -->
							<div class="px-4 py-3 border-y border-gray-100 bg-gray-50 mt-1">
								<h3
									class="text-[11px] font-semibold tracking-[0.06em] text-[#8C8F95]">MY
									활동</h3>
							</div>
							<div class="px-2 py-2 space-y-1">
								<a th:href="@{/mypage/profile}"
									class="w-full inline-flex items-center rounded-lg px-3 py-3 text-[15px] transition-colors"
									th:classappend="${activeMenu == 'profile'} ?
                                  ' bg-gray-100 text-[#222222]' :
                                  ' text-[#4B4E57] hover:bg-gray-50 hover:text-[#222222]'">
									<span
									class="mr-2 inline-flex h-6 w-6 items-center justify-center rounded-full border border-[#C5C7CE]">
										<span
										class="relative block h-3 w-3 rounded-full border border-[#7C7F88]">
											<span
											class="absolute -bottom-1 left-1/2 h-[6px] w-[10px] -translate-x-1/2 rounded-full border border-[#7C7F88] border-t-0"></span>
									</span>
								</span> <span>나의 프로필</span>
								</a> <a th:href="@{/mypage/boards}"
									class="w-full inline-flex items-center rounded-lg px-3 py-3 text-[15px] transition-colors"
									th:classappend="${activeMenu == 'posts'} ?
                                  ' bg-gray-100 text-[#222222]' :
                                  ' text-[#4B4E57] hover:bg-gray-50 hover:text-[#222222]'">
									<span
									class="mr-2 inline-flex h-6 w-6 items-center justify-center rounded-md border border-[#C5C7CE]">
										<span
										class="block h-3 w-2 border border-[#7C7F88] border-t-2 rounded-[3px]"></span>
								</span> <span>내가 쓴 글</span>
								</a> <a th:href="@{/review}"
									class="w-full inline-flex items-center rounded-lg px-3 py-3 text-[15px] transition-colors"
									th:classappend="${activeMenu == 'reviews'} ?
                                  ' bg-gray-100 text-[#222222]' :
                                  ' text-[#4B4E57] hover:bg-gray-50 hover:text-[#222222]'">
									<span
									class="mr-2 inline-flex h-6 w-6 items-center justify-center rounded-full border border-[#C5C7CE]">
										<span
										class="block h-0 w-0 border-l-[6px] border-r-[6px] border-b-[9px] border-l-transparent border-r-transparent border-b-[#7C7F88]"></span>
								</span> <span>리뷰 관리</span>
								</a>
							</div>

							<!-- MY 정보 -->
							<div class="px-4 py-3 border-y border-gray-100 bg-gray-50 mt-1">
								<h3
									class="text-[11px] font-semibold tracking-[0.06em] text-[#8C8F95]">MY
									정보</h3>
							</div>
							<div class="px-2 py-2 space-y-1 mb-2">
								<a th:href="@{/mypage/info}"
									class="w-full inline-flex items-center rounded-lg px-3 py-3 text-[15px] transition-colors"
									th:classappend="${activeMenu == 'member'} ?
                                  ' bg-gray-100 text-[#222222]' :
                                  ' text-[#4B4E57] hover:bg-gray-50 hover:text-[#222222]'">
									<span
									class="mr-2 inline-flex h-6 w-6 items-center justify-center rounded-full border border-[#C5C7CE]">
										<span
										class="relative block h-3 w-3 rounded-full border border-[#7C7F88]">
											<span
											class="absolute -bottom-1 left-1/2 h-[6px] w-[10px] -translate-x-1/2 rounded-full border border-[#7C7F88] border-t-0"></span>
									</span>
								</span> <span>개인정보확인/수정</span>
								</a> <a th:href="@{/mypage/addresses}"
									class="w-full inline-flex items-center rounded-lg px-3 py-3 text-[15px] transition-colors"
									th:classappend="${activeMenu == 'address'} ?
                                  ' bg-gray-100 text-[#222222]' :
                                  ' text-[#4B4E57] hover:bg-gray-50 hover:text-[#222222]'">
									<span
									class="mr-2 inline-flex h-6 w-6 items-center justify-center rounded-full border border-[#C5C7CE]">
										<span
										class="relative block h-3 w-3 rounded-full border border-[#7C7F88]">
											<span
											class="absolute -bottom-[3px] left-1/2 h-[6px] w-[6px] -translate-x-1/2 border-l-2 border-b-2 border-[#7C7F88] rotate-45"></span>
									</span>
								</span> <span>배송지 관리</span>
								</a> <a th:href="@{/mypage/delete}"
									class="w-full inline-flex items-center rounded-lg px-3 py-3 text-[15px] transition-colors"
									th:classappend="${activeMenu == 'delete'} ?
                                  ' bg-[#FFF5F5] text-[#D64545]' :
                                  ' text-[#D64545] hover:bg-[#FFF5F5]'">
									<span
									class="mr-2 inline-flex h-6 w-6 items-center justify-center rounded-md border border-[#F08C8C]">
										<span
										class="block h-3 w-2 border border-[#D64545] border-t-0 rounded-b-[3px]"></span>
								</span> <span>회원탈퇴</span>
								</a>
							</div>

						</div>
					</aside>

					<!-- 오른쪽 영역: 각 페이지에서 채워 넣는 부분 -->
					<main class="lg:col-span-3" layout:fragment="content">
						<!-- 각 마이페이지 화면에서 오버라이드 -->
					</main>

				</div>
			</div>
		</div>

		<!-- footer -->
		<div class="mt-10"></div>
		<div th:replace="~{fragments/footer :: footer}"></div>

	</div>
</body>
</html>
