<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title>마이페이지 - PickQ</title>
</head>
<body>
	<div layout:fragment="content">

		<div class="min-h-[calc(100vh-200px)] bg-gray-50 py-8">
			<div class="mx-auto max-w-7xl px-4">

				<!-- 상단 타이틀 -->
				<div class="mb-8">
					<h1 class="text-3xl font-bold text-gray-900 mb-2">마이페이지</h1>
					<p class="text-gray-600 text-sm">내 정보와 활동 내역을 관리하세요</p>
				</div>

				<div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

					<!-- 왼쪽: 사이드바 -->
					<div class="lg:col-span-1">
						<div
							class="bg-white border border-gray-200 rounded-xl sticky top-24">
							<nav class="flex flex-col">

								<!-- MY 경매 -->
								<div
									class="px-4 py-2 text-xs font-bold text-gray-500 bg-gray-50 border-b border-gray-200">
									MY 경매</div>
								<a th:href="@{/mypage/auctions}"
									class="flex items-center gap-3 px-4 py-3 text-sm font-semibold bg-[#7CBD00] text-white">
									<span>📦</span> 나의 경매 목록
								</a> <a th:href="@{/mypage/bids}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>🔨</span> 나의 입찰 목록
								</a>

								<!-- MY 활동 -->
								<div
									class="px-4 py-2 text-xs font-bold text-gray-500 bg-gray-50 border-y border-gray-200 mt-2">
									MY 활동</div>
								<a th:href="@{/members/memberProfileUpdate}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>👤</span> 나의 프로필
								</a> <a th:href="@{/mypage/boards}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>📝</span> 내가 쓴 글
								</a> <a th:href="@{/#}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>💬</span> 내가 쓴 댓글
								</a> <a th:href="@{/review}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>⭐</span> 리뷰관리
								</a> <a th:href="@{/#}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>❤️</span> 관심 리스트
								</a>

								<!-- MY 정보 -->
								<div
									class="px-4 py-2 text-xs font-bold text-gray-500 bg-gray-50 border-y border-gray-200 mt-2">
									MY 정보</div>
								<a th:href="@{/members/memberUpdate}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>🧾</span> 개인정보 확인/수정
								</a><a th:href="@{/#}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>💳</span> 결제수단 관리
								</a> <a th:href="@{/members/memberAddr}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>📍</span> 배송지 관리
								</a> <a th:href="@{/#}"
									class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-[#7CBD00]">
									<span>🚪</span> 회원탈퇴
								</a>

							</nav>
						</div>
					</div>

					<!-- 오른쪽: 나의 경매 목록만 -->
					<div class="lg:col-span-3">

						<section id="section-my-auctions"
							class="bg-white border border-gray-200 rounded-xl shadow-sm">
							<div class="border-b border-gray-200 px-6 py-4">
								<h2 class="text-xl font-semibold text-gray-900 mb-1">나의 경매
									목록</h2>
								<p class="text-sm text-gray-600">구매자로서 내가 등록한 역경매 요청 리스트입니다.
								</p>
							</div>
							<div class="overflow-x-auto">
								<table class="min-w-full text-sm text-center align-middle">
									<thead class="bg-gray-50 border-b border-gray-200">
										<tr class="text-gray-700">
											<th class="py-3 px-3 w-[10%]">번호</th>
											<th class="py-3 px-3 w-[50%] text-left">제목 및 상태</th>
											<th class="py-3 px-3 w-[25%]">마감일시</th>
											<th class="py-3 px-3 w-[15%]">입찰 건수</th>
										</tr>
									</thead>
									<tbody>
										<tr th:if="${#lists.isEmpty(auctions)}">
											<td colspan="4" class="py-10 text-gray-500">등록된 경매 내역이
												없습니다.</td>
										</tr>
										<tr th:each="auction : ${auctions}"
											class="border-b last:border-b-0 hover:bg-gray-50 transition-colors">
											<td class="py-3 px-3 text-gray-600"
												th:text="${auction.auctionIdx}">1</td>
											<td class="py-3 px-3 text-left"><span
												class="inline-block text-xs text-white rounded-full px-2 py-1 me-2"
												th:text="${auction.auctionStatusName}"
												th:classappend="${auction.auctionStatusCode} == 'open' ? ' bg-[#7CBD00]' : ' bg-gray-500'">
													상태 </span> <a
												th:href="@{/auction/detail/{idx}(idx=${auction.auctionIdx})}"
												class="text-sm font-semibold text-gray-900 hover:text-[#7CBD00] text-decoration-none">
													[[${auction.auctionTitle}]] </a>
												<div class="mt-1 text-xs text-gray-500"
													th:if="${auction.auctionTargetPrice != null}">
													희망 최대가: <span
														th:text="${#numbers.formatInteger(auction.auctionTargetPrice, 3, 'COMMA')}">0</span>원
												</div></td>
											<td class="py-3 px-3 text-gray-700"
												th:text="${#temporals.format(auction.auctionEndAt, 'yyyy-MM-dd HH:mm')}">
												마감일</td>
											<td class="py-3 px-3"><span
												class="text-[#7CBD00] font-semibold"
												th:text="${auction.bidCount}">0</span> <span
												class="text-xs text-gray-500 ms-1">회</span></td>
										</tr>
									</tbody>
								</table>
							</div>
						</section>

					</div>

				</div>

			</div>
		</div>

	</div>
</body>
</html>
