<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
  <title>마이 페이지</title>
</head>

<body>
  <div class="container">
    <div class="profile-auction">
      <h2>내 경매 목록</h2>
      <div class="table-responsive">
        <table class="table table-hover border">
          <thead class="table-light">
            <tr>
              <th>카테고리</th>
              <th>제목</th>
              <th>마감일시</th>
              <th>입찰 건수</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(auctions)}">
              <td colspan="5" class="text-center text-muted">등록하거나 참가한 경매가 없습니다.</td>
            </tr>
            <tr th:each="acution : ${auctions}">
              <td>
                <a th:href="@{/acution/detail/{idx}(idx=${autction.auctionIdx})}" class="text-decoration-none fw-bold text-dark">
                  [[${aution.title}]]
                </a>
              </td>
              <td th:text="${acution.bidCount} + '회'">0회</td>
              <td th:text="${#temporals.format(auction.endDate, 'yyyy-MM-dd HH:mm')}">2026-03-25</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
