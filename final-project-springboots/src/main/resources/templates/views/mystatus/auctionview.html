<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
  <title>마이 페이지</title>
</head>

<body>
  <div class="container">
    <div class="profile-auction">
      <h2>내 경매 목록</h2>
      <div class="table-responsive">
        <table class="table table-hover border">
          <thead class="table-light">
            <tr>
              <th>카테고리</th>
              <th>제목</th>
              <th>마감일시</th>
              <th>입찰 건수</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(auctions)}">
              <td colspan="4" class="text-center text-muted py-5">등록된 경매 내역이 없습니다.</td>
            </tr>
            <tr th:each="auction : ${auctions}">
              <td th:text="${auction.category}">축구</td>

              <td>
                <span th:if="${auction.status == 'ING'}" class="badge bg-success me-1">진행중</span>
                <span th:if="${auction.status == 'END'}" class="badge bg-secondary me-1">종료</span>

                <a th:href="@{/auction/detail/{idx}(idx=${auction.auctionIdx})}"
                  class="text-decoration-none fw-bold text-dark">
                  [[${auction.title}]]
                </a>
              </td>

              <td th:text="${#temporals.format(auction.endDate, 'yyyy-MM-dd HH:mm')}">2026-03-25 15:00</td>

              <td class="text-primary fw-bold" th:text="${auction.bidCount} + '회'">0회</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
