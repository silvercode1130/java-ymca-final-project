<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">

<th:block layout:fragment="content">
    <script type="text/javascript">
    	// 주소창 띄우기
        function findAddr() {

            new daum.Postcode({
                oncomplete: function(data) {
                    $("#memZipcode").val(data.zonecode);
                    $("#memAddr").val(data.address);
                    $("#memAddrDetail").val("").focus();
                }
            }).open();
        }
    	
     // 주소 저장 버튼
     function saveAddr() {
            // 1. 값 불러오기
            const memZipcode    = document.getElementById("memZipcode").value;
            const memAddr       = document.getElementById("memAddr").value;
            const memAddrDetail = document.getElementById("memAddrDetail").value;
            
            // 2. [실무형] 회원 번호 체크
            const memidxInput = document.getElementById("memidx");
            if (!memidxInput || memidxInput.value === "" || memidxInput.value === "0") {
                alert("로그인 정보가 없습니다. 다시 로그인해 주세요!");
                location.href = "/login"; // 로그인 페이지로 유도
                return; // 여기서 함수 종료! (저장 시도 안 함)
            }
            
            const sendIdx = memidxInput.value;

            // 3. 필수 주소 입력값 검증 (이것도 실무 필수!)
            if (memZipcode === "" || memAddr === "") {
                alert("주소를 먼저 검색해 주세요!");
                return;
            }

            fetch("/member/updateAddrAjax.do", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "memZipcode=" + encodeURIComponent(memZipcode) +
                      "&memAddr=" + encodeURIComponent(memAddr) +
                      "&memAddrDetail=" + encodeURIComponent(memAddrDetail) +
                      "&memidx=" + encodeURIComponent(sendIdx)
            })
            .then(res => res.text())
            .then(result => {
                if (result.trim() === "ok") { 
                    alert("✓ 성공적으로 저장되었습니다!");
                    location.href = "/members/memberAddr"; 
                } else {
                    alert("✗ 저장 실패: 다시 시도해 주세요.");
                }
            })
            .catch(err => console.log("에러 발생: ", err));
        }
    </script>

    <div>
        <h2>배송지 관리</h2>
    </div>
    
    <div>
        <form action="/members/memberAddr" id="memberAddrUpdate" method="post">		
        	
        	<input type="hidden" id="memIdx" name="memIdx" th:value="${session.member.memIdx}">
        			
            <div>
                <input type="text" id="memZipcode" name="memZipcode" placeholder="✉️ 우편번호" readonly>
                <input type="button" value="우편번호 찾기" onclick="findAddr()"> <br>
                
                <input type="text" id="memAddr" name="memAddr" placeholder="🏠 주소" readonly> <br>
                
                <input type="text" id="memAddrDetail" name="memAddrDetail" placeholder="🏠 상세주소">
            </div>
            
            <div style="margin-top: 10px;">
                <input type="button" value="주소 저장" onclick="saveAddr()">
            </div>
        </form> 
    </div>
</th:block>
</html>
