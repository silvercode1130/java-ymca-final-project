<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
     
   <th:block layout:fragment="content">
   	 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
      <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
      
      <script type="text/javascript">
         // 전화번호 - 010-xxxx-xxxx 형식
           function formatTel(input) {
               let value = input.value.replace(/[^0-9]/g, "");
   
               if (value.length <= 3) {
                   input.value = value;
               } else if (value.length <= 7) {
                   input.value = value.substring(0, 3) + "-" + value.substring(3);
               } else {
                   input.value = value.substring(0, 3) + "-" +
                                 value.substring(3, 7) + "-" +
                                 value.substring(7, 11);
               }
           } 
         
         // 비밀번호 제약조건 + disabled
         document.addEventListener("DOMContentLoaded", function() {

             const form = document.getElementById("memberUpdateForm");
             const inputs = form.querySelectorAll("input");
             const submitBtn = document.querySelector("#submitBtn");
         
             // 초기값 저장
             const initialValues = {};
             inputs.forEach(input => {
                 initialValues[input.name] = input.value;
             });
         
             submitBtn.disabled = true;
         
             // 모든 input에서 하나의 함수만 실행
             inputs.forEach(input => {
                 input.addEventListener("input", validateAll);
             });
         
             function validateAll() {
                 let isChanged = false;
         
                 // 변경 감지
                 inputs.forEach(input => {
                     if (initialValues[input.name] !== input.value) {
                         isChanged = true;
                     }
                 });
         
                 let pwd = document.querySelector("#newPwd").value.trim();
                 let pwdCheck = document.querySelector("#newPwdConfirm").value.trim();
                 let msg = document.querySelector("#pwdMatchMsg");
         
                 let pwdReg = /^[A-Za-z0-9]{5,}$/;
         
                 // 비밀번호 입력 안했으면 → 변경만 체크
                 if (pwd === "" && pwdCheck === "") {
                     msg.textContent = "";
                     submitBtn.disabled = !isChanged;
                     return;
                 }
         
                 // 비밀번호 제약조건
                 if (!pwdReg.test(pwd)) {
                     msg.style.color = "red";
                     msg.textContent = "✘ 영문 + 숫자 5글자 이상으로 입력해주세요.";
                     submitBtn.disabled = true;
                     return;
                 }
         
                 // 비밀번호 일치 확인
                 if (pwd === pwdCheck) {
                     msg.style.color = "gray";
                     msg.textContent = "✔ 비밀번호가 일치하며 사용 가능합니다.";
         
                     // 변경도 있고 비밀번호도 OK일 때만 활성화
                     submitBtn.disabled = !isChanged; 
                 } else {
                     msg.style.color = "red";
                     msg.textContent = "✘ 비밀번호가 일치하지 않습니다.";
                     submitBtn.disabled = true;
                 }
                 
                 // 이전 비밀번호는 disabled 유지 + 이전 비밀번호니 바꾸지 말라 알리기
                 if (pwd !== "") {
                   fetch("/checkOldPwd", {
                       method: "POST",
                       headers: {
                           "Content-Type": "application/x-www-form-urlencoded"
                       },
                       body: "newPwd=" + encodeURIComponent(pwd)
                   })
                   .then(res => res.json())
                   .then(isSame => {
                       if (isSame) {
                           msg.style.color = "red";
                           msg.textContent = "✘ 기존 비밀번호와 동일합니다.";
                           submitBtn.disabled = true;
                           return;
                       }
                       checkPwdMatch();
                   });
               }
                 
             }
         
         });

      </script>
      
         <div>
            <h2>내 정보 수정</h2>
            <span style="color: gray; font-size: 12px;">회원 정보를 업데이트하세요</span>
         </div>
         
         <div>
            <form action="/mypage/info" id="memberUpdateForm" name="memberUpdateForm" method="post">               
               <div id="id" name="id">
                  <label>아이디</label>
                  <input type="text" name="memId" id="memId" th:value="${memberVO.memId}" readonly>
               </div>
               
               <!-- 추가한 부분 -->
               <div id="grade" name="grade">
                  <label>회원등급</label>
                  <input type="text" name="gradeName" id="gradeName" th:value="${gradeName}" readonly>
               </div>
               
               <div id="name" name="name">
                  <label>이름</label>
                  <input type="text" name="memName" id="memName" th:value="${memberVO.memName}">
               </div>
               
               <div id="email" name="email">
                  <label>이메일</label>
                  <input type="text" name="memEmail" id="memEmail" th:value="${memberVO.memEmail}">
               </div>
               
               <div id="tel" name="tel">
                  <label>전화번호</label>
                  <input type="text" class="form-control" name="memTel" id="memTel" th:value="${memberVO.memTel}"
                               maxlength="13" oninput="formatTel(this)">
               </div>
               
               <div id="bday" name="bday">
                  <label>생년월일</label>
                  <input type="date" name="memBday" id="memBday" th:value="${memberVO.memBday}">
               </div> 
               
               <!-- ##추가 - 기존 비밀번호와 같다면 disabled도 안풀어주고 글 하나 적어주자!! -->
               <div id="pwd" name="pwd">
                  <label>새 비밀번호</label>
                  <input type="password" name="newPwd" id="newPwd" placeholder="🔒 변경할 비밀번호를 입력해주세요"> 
                  <span id="togglePwd">
					<i class="bi bi-eye"></i>
				</span> <br>
                  
                  <label>비밀번호 확인</label>
                  <input type="password" id="newPwdConfirm" placeholder="🔒 변경할 비밀번호를 확인해주세요"> <br>
                  <span id="pwdMatchMsg" style="font-size: 12px;"></span> <br>
               </div>

               <div>
                  <button type="submit" id="submitBtn" disabled>정보 업데이트</button> 
               </div>
            </form>
         </div>
         
         <script type="text/javascript">
	         document.addEventListener("DOMContentLoaded", function () {
	 			const pwdInput = document.getElementById("newPwd");
	 			const newPwdConfirm = document.getElementById("newPwdConfirm");
	 			const togglePwd = document.getElementById("togglePwd");
	 					
	 			if (togglePwd && pwdInput) {
	 				togglePwd.addEventListener("click", function () {
	 					if (pwdInput.type === "password") {
	 					       pwdInput.type = "text";
	 					       newPwdConfirm.type = "text";
	 					       this.innerHTML = '<i class="bi bi-eye-slash"></i>';
	 					 } else {
	 					       pwdInput.type = "password";
	 					       newPwdConfirm.type = "password";
	 					       this.innerHTML = '<i class="bi bi-eye"></i>';
	 					}
	 				});
	 			}
	 		});
		 </script>
   </th:block>
</html>
