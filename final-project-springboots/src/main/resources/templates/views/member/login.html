<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<script type="text/javascript">
//필수 항목 체크 안되면 못 넘어가게 하는 기능
function checkValid() {
    // 변수 선언
    let memId = document.querySelector("#memId").value.trim();
    let memPwd = document.querySelector("#memPwd").value.trim();

    let btn = document.querySelector("input[name='loginBtn']");

    // 모든 값을 입력해야 버튼 활성화		
    let isValid =
    	memId !== "" &&
    	memPwd !== "";

    // 버튼 활성화 / 비활성화
    btn.disabled = !isValid;	

    // 비활성화 시 css 변경
    if (!isValid) {
        btn.style.opacity = "0.5";
        btn.style.cursor = "not-allowed";
    } 
    else {
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
    }
}
</script>

</head>
<body>
	<form class="login" action="/views/member/login.do" method="post">
	
		<div class="title">
			로그인 <br>
			SPORTauction에 오신 것을 환영합니다
		</div>
		
		<div class="">
			계정 정보 입력 <br>
			아이디와 비밀번호를 입력해주세요
		</div>
		
	
		<div class="id">
			<label>아이디</label>
			<input name="memId" id="memId" placeholder="🏷️ your ID">
		</div>
		
		<div class="pwd">
			<label>비밀번호</label>
			<input name="memPwd" id="memPwd" placeholder="🔒 ••••••••">
		</div>
		
		<div class="maintain"><!-- ## 추가 - 나중에 업데이트 예정 -->
		    <label style="cursor: pointer;">
		        <input type="checkbox" name="agree" onchange="checkValid()">
		        로그인 상태 유지
		    </label>
		</div>
		
		<div>
			<a href="/views/member/pwdFind.do">비밀번호 찾기</a>
		</div>
		
		<div class="loginBtn"><!-- ## 수정 - 메인 생기면 메인으로 이동 -->
			<input type="submit" name="loginBtn" value="로그인" onclick="location.href='views/member/signUp.do'" disabled>
		</div>
		
		또는
		
		<div>
			아직 계정이 없으신가요?
			<a href="/views/member/signUp.do">회원가입</a>
		</div>
	
	</form>

</body>
</html>
