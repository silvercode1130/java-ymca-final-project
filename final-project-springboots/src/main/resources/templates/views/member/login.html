<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title>로그인 - PickQ</title>
</head>
<body>
	<th:block layout:fragment="content">

		<script type="text/javascript">
			// 필수 항목 체크 안되면 못 넘어가게 하는 기능
			function checkValid() {
				let memId = document.querySelector("#memId").value.trim();
				let memPwd = document.querySelector("#memPwd").value.trim();
				let btn = document.querySelector("input[name='loginBtn']");

				let isValid = memId !== "" && memPwd !== "";

				btn.disabled = !isValid;

				if (!isValid) {
					btn.style.opacity = "0.5";
					btn.style.cursor = "not-allowed";
				} else {
					btn.style.opacity = "1";
					btn.style.cursor = "pointer";
				}
			}
		</script>

		<div
			class="min-h-[calc(100vh-200px)] flex items-center justify-center px-4 py-12 bg-gray-50">
			<div class="w-full max-w-md">

				<!-- 상단 아이콘 + 타이틀 -->
				<div class="text-center mb-8">
					<div class="flex justify-center mb-4">
						<div
							class="flex h-16 w-16 items-center justify-center rounded-2xl bg-[#7CBD00]">
							<span class="text-3xl text-white">⚡</span>
						</div>
					</div>
					<h1 class="text-3xl font-bold text-gray-900 mb-2">로그인</h1>
					<p class="text-gray-600">pickQ에 오신 것을 환영합니다</p>
				</div>

				<div class="bg-white border border-gray-200 rounded-xl shadow-sm">
					<div class="border-b border-gray-200 px-6 py-4">
						<h2 class="text-lg font-semibold text-gray-900">계정 정보 입력</h2>
						<p class="text-sm text-gray-600 mt-1">아이디와 비밀번호를 입력해주세요</p>
					</div>

					<div class="px-6 py-6">
						<form th:action="@{/members/login}" method="post"
							class="space-y-6">

							<!-- 아이디 -->
							<div class="space-y-2">
								<label for="memId" class="text-sm font-medium text-gray-900">아이디</label>
								<div class="relative">
									<span
										class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">ID</span>
									<input
										class="w-full border border-gray-300 rounded-md px-3 py-2 pl-10 text-sm text-gray-900 placeholder:text-gray-400"
										id="memId" name="memId" placeholder="your ID"
										oninput="checkValid()">
								</div>
							</div>

							<!-- 비밀번호 -->
							<div class="space-y-2">
								<label for="memPwd" class="text-sm font-medium text-gray-900">비밀번호</label>
								<div class="relative">
									<span
										class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">PW</span>
									<input
										class="w-full border border-gray-300 rounded-md px-3 py-2 pl-10 text-sm text-gray-900 placeholder:text-gray-400"
										id="memPwd" name="memPwd" type="password"
										placeholder="••••••••" oninput="checkValid()">
								</div>
							</div>

							<!-- 로그인 버튼 -->
							<div>
								<input type="submit" name="loginBtn" value="로그인"
									class="w-full bg-[#7CBD00] text-white font-semibold py-2.5 rounded-md text-sm hover:bg-[#6BAD00] transition-colors"
									disabled>
							</div>

							<!-- 구분선 -->
							<div class="relative my-4">
								<div class="absolute inset-0 flex items-center">
									<div class="w-full border-t border-gray-200"></div>
								</div>
								<div class="relative flex justify-center text-xs">
									<span class="px-2 bg-white text-gray-500">또는</span>
								</div>
							</div>

							<!-- 회원가입 링크 -->
							<div class="text-center text-sm text-gray-600">
								아직 계정이 없으신가요? <a th:href="@{/members/signUp}"
									class="text-[#7CBD00] hover:underline font-semibold"> 회원가입
								</a>
							</div>

							<!-- 에러 메시지 (있다면) -->
							<div th:if="${errorMessage}"
								class="text-center text-sm text-red-500 mt-2">
								<span th:text="${errorMessage}"></span>
							</div>

						</form>
					</div>
				</div>
			</div>
		</div>

	</th:block>
</body>
</html>
