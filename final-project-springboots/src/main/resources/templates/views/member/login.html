<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block layout:fragment="content">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>

	<script type="text/javascript">
		//필수 항목 체크 안되면 못 넘어가게 하는 기능
		function checkValid() {
		    // 변수 선언
		    let memId = document.querySelector("#memId").value.trim();
		    let memPwd = document.querySelector("#memPwd").value.trim();
	
		    let btn = document.querySelector("input[name='loginBtn']");
	
		    // 모든 값을 입력해야 버튼 활성화		
		    let isValid =
		    	memId !== "" &&
		    	memPwd !== "";
	
		    // 버튼 활성화 / 비활성화
		    btn.disabled = !isValid;	
	
		    // 비활성화 시 css 변경
		    if (!isValid) {
		        btn.style.opacity = "0.5";
		        btn.style.cursor = "not-allowed";
		    } 
		    else {
		        btn.style.opacity = "1";
		        btn.style.cursor = "pointer";
		    }
		}
		
		// 아이디 저장용 ---------------------------------------------------------
		
		// 페이지 로드 시 실행
		window.addEventListener("load", function () {
		    const savedId = localStorage.getItem("savedId");

		    if (savedId) {
		        document.getElementById("memId").value = savedId;
		        document.getElementById("saveId").checked = true;
		    }
		});
		
		// 로그인 버튼 눌렀을 때 저장 처리
		function saveIdCheck() {
		    const memId = document.getElementById("memId").value;
		    const saveId = document.getElementById("saveId").checked;

		    if (saveId) {
		        localStorage.setItem("savedId", memId);
		    } else {
		        localStorage.removeItem("savedId");
		    }
		}
	</script> 

    <div class="row my-5">
        <div class="col-6 offset-3">            
				<!-- 카드 -->
				<div class="bg-white border border-gray-200 rounded-xl shadow-sm">
					<div class="border-b border-gray-200 px-6 py-4">
						<h2 class="text-lg font-semibold text-gray-900">계정 정보 입력</h2>
					</div>

					<div class="px-6 py-6">
						<form th:action="@{/members/login}" method="post" 
							class="space-y-6">
							
							<!-- 인터셉터 메시지 -->
							<div style="font-weight: bold;" th:if="${loginMsg}">
							    <span th:text="${loginMsg}"></span>
							</div>

							<input type="hidden" name="redirect" th:value="${redirect}"> 
							
							<!-- 잠금처리 당한 아이디 -->
							<input type="hidden" id="lockedMemId" th:value="${lockedId}">

							<!-- 아이디 -->
							<div class="space-y-2">
								<label for="memId" class="text-sm font-medium text-gray-900">아이디</label>
								<div class="relative">
									<span
										class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">ID</span>
									<input 
										class="w-full border border-gray-300 rounded-md px-3 py-2 pl-10 text-sm text-gray-900 placeholder:text-gray-400"
										id="memId" name="memId" placeholder="🏷️ your ID"
										oninput="checkValid()"> <br>
									<label>
										<input type="checkbox" id="saveId">아이디 저장
									</label>
								</div>
							</div>

							<!-- 비밀번호 -->
							<div class="space-y-2">
								<label for="memPwd" class="text-sm font-medium text-gray-900">비밀번호</label>
								<div class="relative">
									<span
										class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">PW</span>
									<input
										class="w-full border border-gray-300 rounded-md px-3 py-2 pl-10 text-sm text-gray-900 placeholder:text-gray-400"
										id="memPwd" name="memPwd" type="password"
										placeholder="🔒 ••••••••" oninput="checkValid()">
									<span id="togglePwd">
										<i class="bi bi-eye"></i>
								    </span>
								</div>
							</div>
							
							<!-- 에러 메시지 -->
							<div th:if="${error}" class="text-sm text-red-500">
								<span th:text="${error}" style="color: gray; font-size: 12px;">아이디나 비밀번호가 틀렸습니다</span>
							</div>
							
							<!-- 실시간 카운트다운 표시 -->
							<div id="lockTimer" style="color: gray; font-size: 12px; margin-top: 5px;"></div>

							<!-- 로그인 버튼 -->
							<div>
								<input type="submit" name="loginBtn" value="로그인" onclick="saveIdCheck()"
									class="w-full bg-[#7CBD00] text-white font-semibold py-2.5 rounded-md text-sm hover:bg-[#6BAD00] transition-colors"
									disabled>
							</div>

							<!-- 구분선 -->
							<div class="relative my-4">
								<div class="absolute inset-0 flex items-center">
									<div class="w-full border-t border-gray-200"></div>
								</div>
								<div class="relative flex justify-center text-xs">
									<span class="px-2 bg-white text-gray-500">또는</span>
								</div>
							</div>

							<!-- 회원가입 링크 -->
							<div class="text-center text-sm text-gray-600">
								아직 계정이 없으신가요? 
								<a th:href="@{/members/register}" class="text-[#7CBD00] hover:underline font-semibold"> 
									회원가입
								</a>
							</div>
							
							<!-- 비밀번호 링크 -->
							<div class="text-center text-sm text-gray-600">
								비밀번호를 잊으셨나요?
								<a th:href="@{/members/pwdFind}" class="text-[#7CBD00] hover:underline font-semibold"> 
									비밀번호 찾기
								</a>
							</div>
						</form>
						
						<hr>
						
						<!-- 네이버 버튼 -->
						<div id="naverIdLogin"></div> 
						
					</div>
				</div>
			</div> 
		</div>
		

			<script type="text/javascript">
				// SDK 초기화 및 버튼 생성
			    var naverLogin = new naver.LoginWithNaverId({
			        clientId: "2Rk518jWd9bxOQoKuUnD", // 발급받은 Client ID
			        callbackUrl: "http://localhost:8080/members/naverCallback", // 등록한 Callback URL
			        isPopup: false, // 팝업 방식으로 진행할지 여부
			        loginButton: { color: "green", type: 3, height: 60 } // 버튼 스타일 설정
			    });
			    naverLogin.init();

				
				// 새로고침 x / 실시간 o 
				document.addEventListener("DOMContentLoaded", function () {
				    const errorText = /*[[${error != null ? error : ''}]]*/ "";
				    const timerDiv = document.getElementById("lockTimer");
				    const loginBtn = document.querySelector("input[name='loginBtn']");
				    const lockedMemId = document.getElementById("lockedMemId")?.value || "";
				
				    if (lockedMemId && timerDiv) {
				
				        function updateTimer() {
				            fetch('/members/getRemainingTime?memId=' + encodeURIComponent(lockedMemId))
				                .then(response => response.json())
				                .then(data => {
				                    if (data.remainingSeconds > 0) {
				                        timerDiv.innerHTML =
				                            `⏳ 로그인 제한 중 (${data.remainingSeconds}초 남음)`;
				                        if (loginBtn) loginBtn.disabled = true;
				                    } else {
				                        timerDiv.innerHTML = "다시 로그인을 시도해주세요";
				                        if (loginBtn) loginBtn.disabled = false;
				                        if (interval) clearInterval(interval);
				                    }
				                })
				                .catch(error => console.error("Timer error:", error));
				        }
				
				        updateTimer();
				        const interval = setInterval(updateTimer, 1000);
				    }

				 	// 비번 보기 기능
					const pwdInput = document.getElementById("memPwd");
			        const togglePwd = document.getElementById("togglePwd");
			
			        if (togglePwd && pwdInput) {
			            togglePwd.addEventListener("click", function () {
			                if (pwdInput.type === "password") {
			                    pwdInput.type = "text";
			                    this.innerHTML = '<i class="bi bi-eye-slash"></i>';
			                } else {
			                    pwdInput.type = "password";
			                    this.innerHTML = '<i class="bi bi-eye"></i>';
			                }
			            });
			        }
				    
				});
			</script>

	</th:block>
</body>
</html>
