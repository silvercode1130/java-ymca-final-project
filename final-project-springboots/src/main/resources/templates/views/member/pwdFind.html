<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script type="text/javascript">
	//전화번호 - 010-xxxx-xxxx 형식
	function formatTel(input) {
	  let value = input.value.replace(/[^0-9]/g, "");
	
	  if (value.length <= 3) {
	    input.value = value;
	  } else if (value.length <= 7) {
	    input.value = value.substring(0, 3) + "-" + value.substring(3);
	  } else {
	    input.value = value.substring(0, 3) + "-" +
	                  value.substring(3, 7) + "-" +
	                  value.substring(7, 11);
	  }
	}
	
	// 인증번호가 맞는지 체크
	function checkAuthCode() {
    let userCode = $("#userInputCode").val(); // 사용자가 입력한 인증번호
    
    $.ajax({
        url: "/auth/verifyCode", // 서버 인증번호 검증 주소 
        type: "POST",
        data: { "userCode": userCode },
        success: function(res) {
            if(res === "success") {
                $("#authMsg").text("인증 되었습니다").css("color", "gray");
            } else {
                $("#authMsg").text("인증번호가 틀렸니다").css("color", "red");
            }  
       	},
        error: function() { 
        	alert("죄송합니다 \n예기치 못한 오류가 발생하여 잠시 후 다시 시도해 주세요");
        }
    });
}
</script>

</head>
<body> 
	<div class="title">
		비밀번호 찾기
	</div>
	
	<!-- 
		비밀번호를 찾기 위해 아이디와 전화번호를 입력하면 
		인증번호가 전송되고(해당 연락처에 전송) 인증번호를 확인
		-> 아이디나 전화번호 틀리면 인증번호 안보냄
		
		비밀번호를 바꾸면 끝
		-> 단 이전 비밀번호와 동일하거나 비밀번호를 다르게 처리하면 안됨
 	-->
 	
	<form class="pwdFind" action="/members/pwdFind" method="post">
		<div>
			<label>아이디</label> <br>
		    ID <input type="text" name="memId" placeholder="your ID" required> <br>
		    <div class="msg" th:text="${idMsg}" style="color: gray; font-size: 12px;"></div>
		    <label>전화번호</label> <br>
		    TEL <input type="text" name="memTel" placeholder="010-1234-5678" maxlength="13"
								oninput="formatTel(this)" required> <br>
			<div class="msg" th:text="${telMsg}" style="color: gray; font-size: 12px;"></div>
		    <button type="submit">인증번호 받기</button>
		</div>
	
		<div class="msg" th:text="${verifyMsg}"></div>
	</form>

	<hr>
	
	<form class="newPwdFind" action="/members/newPwdFind">
		<div>
			<label>인증번호</label> <br>
		    <input type="text" id="userInputCode" name="authCode" placeholder="인증번호를 입력하세요"> 
		    <button type="button" onclick="checkAuthCode()">확인</button> <br>
		    <span id="authMsg"></span> <br>
		    
		    <label>새 비밀번호</label> <br> 
	        <input type="password" name="newPassword" placeholder="새 비밀번호를 입력하세요"> <br>
	        <input type="password" name="newPassword" placeholder="새 비밀번호 확인">
	
			<!-- 인증 완료 + 비번 입력란 동일해야 disabled 풀림 -->
	        <button type="submit">변경</button>
		</div>
	</form>
	
</body>
</html>
