<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script type="text/javascript">

	//전화번호 - 010-xxxx-xxxx 형식
	function formatTel(input) {
	  let value = input.value.replace(/[^0-9]/g, "");
	
	  if (value.length <= 3) {
	    input.value = value;
	  } else if (value.length <= 7) {
	    input.value = value.substring(0, 3) + "-" + value.substring(3);
	  } else {
	    input.value = value.substring(0, 3) + "-" +
	                  value.substring(3, 7) + "-" +
	                  value.substring(7, 11);
	  }
	}
	
	// 인증번호가 맞는지 체크
	function checkAuthCode() { 
    let userCode = $("#userInputCode").val(); // 사용자가 입력한 인증번호
    
    $.ajax({
        url: "/auth/verifyCode", // 서버 인증번호 검증 주소 
        type: "POST",
        data: { "userCode": userCode },
        success: function(res) {
            if(res === "success") {
            	isAuthOk = true;        
                //checkAll(); // 비번 검증도 못하는데 왜 필요함? -> 인증번호 다음에 해야 함(코드 상으로도 아래에 있어서 안됨)         
                $("#authMsg").text("인증 되었습니다").css({"color": "gray", "fontSize": "12px"});
            } else {
            	isAuthOk = false;  
                $("#authMsg").text("인증번호가 틀렸습니다").css({"color": "red", "fontSize": "12px"});
            }  
       	},
        error: function() { 
        	alert("죄송합니다 \n예기치 못한 오류가 발생하여 잠시 후 다시 시도해 주세요");
        }
    });
}
	
	// 새 비밀번호 인증
	let isSamePwd = false;
	//let isAuthOk = false;  // 지역변수고 뭐고 간에 false면 인증코드 틀림 처리

	$(document).ready(function() { 
	
	    $("#newPwd, #newPwdConfirm").on("keyup", function() {
	    	checkAll();
	    });
	
	    $("#newPwd").on("blur", function() {
	        let newPwd = $(this).val();
	
	        $.ajax({ 
	            url: "/auth/checkSamePwd",
	            type: "POST",
	            data: { "newPwd": newPwd },
	            success: function(res) {
	                if (res === "same") {
	                    isSamePwd = true;
	                    $("#pwdMatchMsg").text("이전 비밀번호입니다").css("color", "red");
	                } else {
	                    isSamePwd = false;
	                }
	                checkAll();
	            }
	        });
	    });
	});
	
	// 모든 조건을 한 번에 체크
	function checkAll() {
	    let pwd1 = $("#newPwd").val();
	    let pwd2 = $("#newPwdConfirm").val();
	    let submitBtn = $("#submitBtn");
	
	    let pwdReg = /^[A-Za-z0-9]{5,}$/;
	
	    let isPwdValid = false;
	    let isMatch = false;
	
	    // 비밀번호 조건
	    if (!pwdReg.test(pwd1)) {
	        $("#pwdMsg").text("✘ 영문 + 숫자 5글자 이상").css("color", "red");
	        isPwdValid = false;
	    } else {
	        $("#pwdMsg").text("✔ 사용 가능한 비밀번호").css("color", "gray");
	        isPwdValid = true;
	    }
	
	    // 비밀번호 확인
	    if (pwd2 === "") {
	        $("#pwdConfirmMsg").text("").css("color", "gray");
	        isMatch = false;
	    } else if (pwd1 === pwd2) {
	        $("#pwdConfirmMsg").text("✔ 비밀번호 일치").css("color", "gray");
	        isMatch = true;
	    } else {
	        $("#pwdConfirmMsg").text("✘ 비밀번호 불일치").css("color", "red");
	        isMatch = false;
	    }
	
	    // 버튼 제어 
	    if (isPwdValid && isMatch && isAuthOk) {
	        submitBtn.prop("disabled", false);
	    } else {
	        submitBtn.prop("disabled", true);
	    }
	}
</script>

</head>
<body> 
	<div class="title">
		비밀번호 찾기
	</div>
 	
	<form class="pwdFind" action="/members/pwdFind" method="post">
		<div>
			<label>아이디</label> <br>
		    ID <input type="text" name="memId" placeholder="your ID" required> <br>
		    <div class="msg" th:text="${idMsg}" style="color: gray; font-size: 12px;"></div>
		    <label>전화번호</label> <br>
		    TEL <input type="text" name="memTel" placeholder="010-1234-5678" maxlength="13"
								oninput="formatTel(this)" required> <br>
			<div class="msg" th:text="${telMsg}" style="color: gray; font-size: 12px;"></div>
		    <button type="submit">인증번호 받기</button>
		</div>
	
		<div class="msg" th:text="${verifyMsg}"></div>
	</form>

	<hr>
	
	<form class="newPwdFind" action="/members/newPwdFind" method="post">
		<div>
			<label>인증번호</label> <br>
		    <input type="text" id="userInputCode" name="authCode" placeholder="인증번호를 입력하세요"> 
		    <button type="button" onclick="checkAuthCode()">확인</button> <br>
		    <span id="authMsg"></span> <br>
		    
		    <label>비밀번호</label> <br> 
			<span style="font-size: 11px; color: gray;">✓ 알파벳 + 숫자로만 조합해주세요 (5글자 이상)</span> <br>
			<input type="password" id="newPwd" name="newPassword" placeholder="새 비밀번호를 입력하세요">
			<span id="togglePwd">
				<i class="bi bi-eye"></i>
			</span> <br>
			<span id="pwdMsg" style="font-size: 12px;"></span> <br>
			
			<label style="margin-top: 10px; display: inline-block;">비밀번호 확인</label> <br>
			<input type="password" id="newPwdConfirm" placeholder="다시 한번 입력하세요"> <br>
			<span id="pwdMatchMsg" style="font-size: 12px;"></span> <br>
			
			<button type="submit" id="submitBtn" disabled>변경</button>
		</div>
	</form>
	
	<script type="text/javascript">
		document.addEventListener("DOMContentLoaded", function () {
			const pwdInput = document.getElementById("newPwd");
			const newPwdConfirm = document.getElementById("newPwdConfirm");
			const togglePwd = document.getElementById("togglePwd");
					
			if (togglePwd && pwdInput) {
				togglePwd.addEventListener("click", function () {
					if (pwdInput.type === "password") {
					       pwdInput.type = "text";
					       newPwdConfirm.type = "text";
					       this.innerHTML = '<i class="bi bi-eye-slash"></i>';
					 } else {
					       pwdInput.type = "password";
					       newPwdConfirm.type = "password";
					       this.innerHTML = '<i class="bi bi-eye"></i>';
					}
				});
			}
		});
	</script>
	
</body>
</html>
