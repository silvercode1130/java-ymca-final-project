<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>배송지 관리 - 마이페이지</title>
</head>
<body>
	<div layout:fragment="content">

		<div class="space-y-6">
			<!-- 배송지 카드들 -->
			<div th:if="${#lists.size(addressList) > 0}" class="space-y-4">
				<div th:each="addr : ${addressList}"
					class="border border-gray-200 bg-white rounded-xl"
					th:classappend="${addr.defaultYn} == 'Y' ? ' ring-2 ring-[#7CBD00]' : ''">
					<div class="px-6 py-4 border-b border-gray-100">
						<div class="flex items-center justify-between">
							<h3 class="text-sm sm:text-base font-semibold text-gray-900"
								th:text="${addr.addressName}">자택</h3>
							<span th:if="${addr.defaultYn} == 'Y'"
								class="inline-flex items-center px-2 py-1 rounded-full bg-[#7CBD00] text-white text-[11px] font-medium">
								대표 배송지 </span>
						</div>
					</div>
					<div class="px-6 py-4 space-y-3">
						<div>
							<div class="text-sm text-gray-500 mb-1">주소</div>
							<div class="text-sm text-gray-900" th:text="${addr.address}">
								서울시 강남구 테헤란로 123</div>
						</div>
						<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
							<div>
								<div class="text-sm text-gray-500 mb-1">받는 분</div>
								<div class="text-sm text-gray-900" th:text="${addr.receiver}">
									홍길동</div>
							</div>
							<div>
								<div class="text-sm text-gray-500 mb-1">연락처</div>
								<div class="text-sm text-gray-900" th:text="${addr.phone}">
									010-1234-5678</div>
							</div>
						</div>

						<div class="flex flex-wrap gap-2 pt-1">
							<button type="button"
								class="inline-flex items-center px-3 py-1.5 rounded-md border border-gray-300 text-xs sm:text-sm text-gray-700 hover:bg-gray-50"
								th:onclick="|location.href='/mypage/address/' + ${addr.addressIdx} + '/edit'|">
								수정</button>
							<button type="button"
								class="inline-flex items-center px-3 py-1.5 rounded-md border border-red-300 text-xs sm:text-sm text-red-600 hover:bg-red-50"
								th:onclick="|if(confirm('해당 배송지를 삭제하시겠습니까?')) location.href='/mypage/address/' + ${addr.addressIdx} + '/delete';|">
								삭제</button>
							<button type="button" th:if="${addr.defaultYn} != 'Y'"
								class="inline-flex items-center px-3 py-1.5 rounded-md border border-[#7CBD00] text-xs sm:text-sm text-[#7CBD00] hover:bg-[#F4FCE3]"
								th:onclick="|location.href='/mypage/address/' + ${addr.addressIdx} + '/default'|">
								대표 배송지로 설정</button>
						</div>
					</div>
				</div>
			</div>

			<!-- 배송지 없을 때 -->
			<div th:if="${#lists.isEmpty(addressList)}"
				class="border border-gray-200 bg-white rounded-xl">
				<div class="px-6 py-6 text-center text-sm text-gray-500">등록된
					배송지가 없습니다</div>
			</div>

			<!-- 새 배송지 추가 버튼 -->
			<div>
				<button type="button"
					class="w-full inline-flex items-center justify-center px-4 py-2.5 bg-[#7CBD00] text-white rounded-md text-sm font-semibold hover:bg-[#6BAD00]"
					th:onclick="|location.href='/mypage/address/new'|">새 배송지
					추가</button>
			</div>
		</div>

	</div>
</body>
</html>
