<!-- 네이버 콜백 JS - 없으면 로그인 안됨 -->
<script>
	//callback.html 또는 콜백 처리 스크립트
	var naverLogin = new naver.LoginWithNaverId({
	    clientId: "2Rk518jWd9bxOQoKuUnD",
	    callbackUrl: "http://localhost:8080/members/naverCallback",
	    // 시연 시 주소 변경
	    //callbackUrl: "http://localhost:8080/members/naverCallback",
	    isPopup: false
	});
	
	naverLogin.init();
	
	// 로그인 상태에 따라 사용자 정보를 처리합니다.
	window.addEventListener('load', function () {
	    naverLogin.getLoginStatus(function (status) {
	        if (status) {
	            var email = naverLogin.user.getEmail();
	            var name = naverLogin.user.getName();
	            var tel = naverLogin.user.getMobile();
	            var birthyear = naverLogin.user.getBirthyear();
	            var birthday = naverLogin.user.getBirthday();
	            var memBday = birthyear + "-" + birthday;
	            
	            console.log("로그인 성공! 유저 정보:", email, name);
	            
	            fetch("/members/naverCallback", {
	                method: "POST",
	                headers: {
	                    "Content-Type": "application/x-www-form-urlencoded"
	                },
	                body:
	                    "memName=" + encodeURIComponent(name) +
	                    "&memEmail=" + encodeURIComponent(email) +
	                    "&memTel=" + encodeURIComponent(tel) +
	                    "&memBday=" + encodeURIComponent(memBday)
	            })
		            .then(() => {
		                window.location.href = "/main"; 
	            });
	            
	            // 여기서 서버에 정보를 보내거나 메인 페이지로 리다이렉트합니다.
	        } else {
	            console.log("AccessToken이 유효하지 않습니다.");
	        }
	    });
	});

</script>



<!-- 로딩 페이지 꾸미기 -->
<script type="text/javascript">
	var naverLogin = new naver.LoginWithNaverId({
	    clientId: "2Rk518jWd9bxOQoKuUnD",
	    callbackUrl: "http://localhost:8080/members/naverCallback",
		// 시연 시 주소 변경
	    //callbackUrl: "http://localhost:8080/members/naverCallback",
	    isPopup: false
	});
	
	naverLogin.init();
	
	window.addEventListener('load', function () {
	    const statusText = document.getElementById('loadingStatus'); 
	    
	    // 1단계: 인증 시작
	    statusText.innerText = "네이버 로그인 인증 중... 🔑";
	
	    naverLogin.getLoginStatus(function (status) {
	        if (status) {
	            // 2단계: 정보 가져오기 성공
	            statusText.innerText = "회원 정보 확인 중... ⚽";
	
	            var email = naverLogin.user.getEmail();
	            var name = naverLogin.user.getName();
	            var tel = naverLogin.user.getMobile();
	            var birthyear = naverLogin.user.getBirthyear();
	            var birthday = naverLogin.user.getBirthday();
	            var memBday = birthyear + "-" + birthday;
	
	            // 3단계: 서버로 전송 (DB 작업 중!)
	            fetch("/members/naverCallback", {
	                method: "POST",
	                headers: { "Content-Type": "application/x-www-form-urlencoded" },
	                body: "memName=" + encodeURIComponent(name) +
	                      "&memEmail=" + encodeURIComponent(email) +
	                      "&memTel=" + encodeURIComponent(tel) +
	                      "&memBday=" + encodeURIComponent(memBday)
	            })
	            .then(() => {
	                // 4단계: 서버 처리까지 끝났을 때만!
	                statusText.innerText = "로그인 성공! 메인으로 이동합니다! 🏆";
	                setTimeout(() => {
	                    window.location.href = "/main"; 
	                }, 1000); // 성공 멘트 보여주려고 1초만 대기!
	            })
	            .catch(err => {
	                statusText.innerText = "데이터 처리 중 오류가 발생했어요. 😭";
	                console.error(err);
	            });
	            
	        } else {
	            statusText.innerText = "인증에 실패했습니다. 다시 시도해주세요.";
	        }
	    });
	});
</script>

<div class="loader-container">
    <div class="ball-spinner"></div>
    <div id="loadingStatus">네이버 로그인 확인 중...</div>
</div>

<script>
    // 1. 초기화 (객체 생성 및 init은 딱 한 번만 수행)
    var naverLogin = new naver.LoginWithNaverId({
        clientId: "2Rk518jWd9bxOQoKuUnD",
        callbackUrl: "http://172.30.1.94:8080/members/naverCallback",
        isPopup: false
    });
    
    naverLogin.init();
    
    window.addEventListener('load', function () {
        const statusText = document.getElementById('loadingStatus');
        statusText.innerText = "네이버 로그인 인증 중... 🔑";

        // 2. 로그인 상태 확인
        naverLogin.getLoginStatus(function (status) {
            if (status) {
                // [성공] 토큰 읽기 성공 시에만 서버 전송 로직 실행
                statusText.innerText = "회원 정보 확인 중... ⚽";

                var user = naverLogin.user;
                var email = user.getEmail();
                var name = user.getName();
                var tel = user.getMobile();
                var birthyear = user.getBirthyear();
                var birthday = user.getBirthday();
                var memBday = (birthyear && birthday) ? (birthyear + "-" + birthday) : "";

                console.log("로그인 성공! 유저 정보:", email, name);

                // 서버로 데이터 전송 (POST)
                fetch("/members/naverCallback", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: "memName=" + encodeURIComponent(name) +
                          "&memEmail=" + encodeURIComponent(email) +
                          "&memTel=" + encodeURIComponent(tel) +
                          "&memBday=" + encodeURIComponent(memBday)
                })
                .then(response => {
                    if (response.ok) {
                        statusText.innerText = "로그인 성공! 메인으로 이동합니다! 🏆";
                        setTimeout(() => {
                            window.location.href = "/main"; 
                        }, 800);
                    } else {
                        // 서버 라우팅 문제일 때만 404 등이 뜸
                        statusText.innerText = "서버 응답 오류 (Status: " + response.status + ")";
                    }
                })
                .catch(err => {
                    statusText.innerText = "데이터 처리 중 오류 발생 😭";
                    console.error("Fetch Error:", err);
                });

            } else {
                // [실패] SDK가 주소창의 토큰을 못 읽었을 때
                console.error("AccessToken이 유효하지 않거나 주소창에서 읽을 수 없습니다.");
                console.log("현재 주소창 hash 확인:", window.location.hash);
                statusText.innerText = "인증에 실패했습니다. (토큰 유실)";
                
                // 404를 방지하기 위해 여기서 fetch를 실행하지 않고 멈춤
            }
        });
    });
</script>

<style>
.loader-container { text-align: center; margin-top: 20%; }
.ball-spinner {
    width: 50px; height: 50px; border: 5px solid #f3f3f3;
    border-top: 5px solid #ff6b00; border-radius: 50%;
    animation: spin 1s linear infinite; margin: 0 auto 20px;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
#loadingStatus { font-family: 'Pretendard', sans-serif; font-size: 1.2rem; font-weight: bold; color: #333; }
</style>
