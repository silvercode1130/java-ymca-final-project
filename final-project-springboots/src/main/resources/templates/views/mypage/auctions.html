<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>내 경매 목록 - PickQ</title>
</head>
<body>
	<main layout:fragment="content">

		<div
			class="bg-white border border-gray-100 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] overflow-hidden">

			<!-- 헤더 -->
			<div class="px-6 py-5 border-b border-gray-100">
				<h2 class="text-lg sm:text-xl font-semibold text-[#222222]">나의
					경매 목록</h2>
				<p class="mt-1 text-xs sm:text-sm text-[#767676]">내가 등록한 구매 요청
					목록</p>
			</div>

			<!-- 본문: 카드 리스트 -->
			<div class="px-4 py-4 sm:px-6 sm:py-5">

				<!-- 비어있을 때 -->
				<div th:if="${#lists.isEmpty(auctions)}"
					class="py-10 text-center text-sm text-gray-400 border border-dashed border-gray-200 rounded-lg">
					등록한 경매가 없습니다.</div>

				<!-- 데이터 있을 때 -->
				<div th:if="${!#lists.isEmpty(auctions)}" class="space-y-3">
					<div th:each="auction : ${auctions}"
						class="cursor-pointer rounded-xl border border-gray-200 bg-gray-50 px-4 py-4 sm:px-5 sm:py-4 hover:border-[#7CBD00] transition-colors"
						th:onclick="|location.href='/auctions/${auction.auctionIdx}'|">

						<!-- 제목 + 상태 -->
						<div class="mb-3 flex items-center justify-between gap-3">
							<div>
								<div class="text-sm font-semibold text-[#222222]"
									th:text="${auction.auctionTitle}">프로 축구공 FIFA 공인구 구함</div>
								<div class="mt-1 text-[11px] text-[#999999]"
									th:text="${auction.itemCategoryName}">카테고리</div>
							</div>

							<!-- 상태 배지 -->
							<div>
								<span
									class="inline-flex items-center rounded-full px-3 py-1 text-[11px] font-semibold"
									th:if="${auction.auctionStatusIdx == 1}"
									style="background: #E6F4D6; color: #4C7C00;"
									th:text="${auction.auctionStatusName}"> 진행중 </span> <span
									class="inline-flex items-center rounded-full px-3 py-1 text-[11px] font-semibold bg-gray-100 text-gray-600"
									th:if="${auction.auctionStatusIdx == 3}"
									th:text="${auction.auctionStatusName}"> 마감 </span> <span
									class="inline-flex items-center rounded-full px-3 py-1 text-[11px] font-semibold bg-gray-100 text-gray-500"
									th:if="${auction.auctionStatusIdx != 1 and auction.auctionStatusIdx != 3}"
									th:text="${auction.auctionStatusName}"> 기타 </span>
							</div>
						</div>

						<!-- 정보 4칸 -->
						<div
							class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-xs sm:text-sm">
							<div>
								<div class="text-[#9ca3af]">희망가</div>
								<div class="mt-0.5 font-semibold text-[#222222]"
									th:text="${#numbers.formatInteger(auction.auctionTargetPrice, 0, 'COMMA') + '원'}">
									50,000원</div>
							</div>
							<div>
								<div class="text-[#9ca3af]">최저 제안가</div>
								<div class="mt-0.5 font-semibold"
									th:classappend="${auction.minBidPrice == 0} ? ' text-gray-500' : ' text-[#7CBD00]'"
									th:text="${auction.minBidPrice == 0 ? '입찰 없음' : #numbers.formatInteger(auction.minBidPrice, 0, 'COMMA') + '원'}">
									45,000원</div>
							</div>
							<div>
								<div class="text-[#9ca3af]">제안 수</div>
								<div class="mt-0.5 text-[#222222]"
									th:text="${auction.bidCount + '건'}">12건</div>
							</div>
							<div>
								<div class="text-[#9ca3af]">마감일</div>
								<div class="mt-0.5 text-[#222222]"
									th:text="${#temporals.format(auction.auctionEndAt, 'yyyy-MM-dd')}">
									2026-03-12</div>
							</div>
						</div>

						<!-- 등록일 -->
						<div class="mt-3 text-right text-[11px] text-[#9ca3af]">
							등록일 <span
								th:text="${#temporals.format(auction.auctionRegdate, 'yyyy-MM-dd')}">
								2026-03-10 </span>
						</div>

					</div>
				</div>

			</div>
		</div>

	</main>
</body>
</html>
