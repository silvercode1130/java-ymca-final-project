<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>내 경매 목록</title>
</head>

<body>

  <h2>내 경매 목록</h2>

  <table>
    <thead>
      <tr>
        <th>경매 제목</th>
        <th>카테고리</th>
        <th>희망 최대가</th>
        <th>입찰 수</th>
        <th>최저 입찰가</th>
        <th>상태</th>
        <th>마감일</th>
        <th>등록일</th>
        <th>배송정보</th>
      </tr>
    </thead>
    <tbody>
      <tr th:if="${#lists.isEmpty(auctions)}">
        <td colspan="9">등록한 경매가 없습니다.</td>
      </tr>
      <tr th:each="auction : ${auctions}">
        <td>
          <a th:href="@{/auctions/{idx}(idx=${auction.auctionIdx})}"
             th:text="${auction.auctionTitle}"></a>
        </td>
        <td th:text="${auction.itemCategoryName}"></td>
        <td th:text="${#numbers.formatInteger(auction.auctionTargetPrice, 0, 'COMMA') + '원'}"></td>
        <td th:text="${auction.bidCount}"></td>
        <td th:text="${auction.minBidPrice == 0 ? '입찰 없음' : #numbers.formatInteger(auction.minBidPrice, 0, 'COMMA') + '원'}"></td>
        <td th:text="${auction.auctionStatusName}"></td>
        <td th:text="${#temporals.format(auction.auctionEndAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td th:text="${#temporals.format(auction.auctionRegdate, 'yyyy-MM-dd')}"></td>
        <td>
          <!-- 결제대기(7): 결제하기 -->
          <a th:if="${auction.auctionStatusIdx == 7}"
             th:href="@{/mypage/payment/pay(auctionIdx=${auction.auctionIdx})}"
             class="btn-pay">결제하기</a>

          <!-- 배송중(9) -->
          <span th:if="${auction.auctionStatusIdx == 9}">배송중</span>

          <!-- 배송완료(10): 수령확인 -->
          <button th:if="${auction.auctionStatusIdx == 10}"
                  th:attr="data-auction-idx=${auction.auctionIdx}"
                  class="btn-confirm"
                  onclick="confirmReceipt(this)">수령확인</button>
        </td>
      </tr>
    </tbody>
  </table>

<script>
  function confirmReceipt(btn) {
    if (!confirm("수령 확인하시겠습니까? 확인 후 판매자에게 대금이 지급됩니다.")) return;

    const auctionIdx = btn.getAttribute("data-auction-idx");

    fetch("/api/payment/confirm-receipt", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ auctionIdx: auctionIdx })
    })
      .then(res => res.json())
      .then(data => {
        alert("수령 확인이 완료되었습니다!");
        location.reload();
      })
      .catch(err => {
        alert("오류가 발생했습니다: " + err.message);
      });
  }
</script>

</body>
</html>
