<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">

<head>
	<meta charset="UTF-8">
	<title>내 입찰 목록 - 마이페이지</title>
</head>

<body>
	<div layout:fragment="content">

		<div class="bg-white border border-gray-100 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] overflow-hidden">

			<!-- 헤더 -->
			<div
				class="px-6 py-5 border-b border-gray-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
				<div>
					<h2 class="text-lg sm:text-xl font-semibold text-[#222222]">내
						입찰 목록</h2>
					<p class="mt-1 text-xs sm:text-sm text-[#767676]">내가 참여한 판매
						제안(입찰) 목록</p>
				</div>
				<div>
					<a href="/mypage/sales"
						class="inline-flex items-center px-4 py-2.5 rounded-md border border-gray-300 text-xs sm:text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
						판매 내역 보기 </a>
				</div>
			</div>

			<!-- 본문 -->
			<div class="px-4 py-4 sm:px-6 sm:py-5">

				<!-- 비어있을 때 -->
				<div th:if="${#lists.isEmpty(bids)}"
					class="py-10 text-center text-sm text-gray-400 border border-dashed border-gray-200 rounded-lg">
					참여한 입찰이 없습니다.</div>

				<!-- 데이터 있을 때 -->
				<div th:if="${!#lists.isEmpty(bids)}" class="space-y-3">

					<!-- 데스크탑: 헤더 -->
					<div
						class="hidden md:grid md:grid-cols-[3fr_2fr_1.5fr_1.5fr_1.5fr_2fr_1.8fr] text-[11px] text-gray-500 px-2 pb-2 border-b border-gray-100">
						<span>경매 제목</span> <span>상품명</span> <span>브랜드</span> <span
							class="text-right">제안 가격</span> <span class="text-center">입찰
							상태</span> <span class="text-center">입찰일</span> <span class="text-center">배송처리</span>
					</div>

					<!-- 각 입찰 카드/행 -->
					<div th:each="item : ${bids}"
						class="rounded-xl border border-gray-200 bg-gray-50 px-4 py-4 sm:px-5 sm:py-4 hover:border-[#7CBD00] transition-colors">

						<!-- 데스크탑 뷰 -->
						<div
							class="hidden md:grid md:grid-cols-[3fr_2fr_1.5fr_1.5fr_1.5fr_2fr_1.8fr] items-center text-xs sm:text-sm gap-2">

							<!-- 경매 제목 (링크) -->
							<div class="truncate">
								<a th:href="@{/auctions/{idx}(idx=${item.bid.auctionIdx})}"
									th:text="${item.bid.itemName}"
									class="text-[#222222] font-semibold hover:underline"> </a>
							</div>

							<!-- 상품명 -->
							<div class="text-gray-700" th:text="${item.bid.itemName}"></div>

							<!-- 브랜드 -->
							<div class="text-gray-600"
								th:text="${item.bid.itemBrand != null ? item.bid.itemBrand : '-'}">
							</div>

							<!-- 제안 가격 -->
							<div class="text-right font-semibold text-[#222222]"
								th:text="${#numbers.formatInteger(item.bid.bidPrice, 0, 'COMMA') + '원'}">
							</div>

							<!-- 입찰 상태 -->
							<div class="text-center text-gray-700"
								th:text="${item.bid.bidStatusName}"></div>

							<!-- 입찰일 -->
							<div class="text-center text-[11px] text-gray-500"
								th:text="${#temporals.format(item.bid.bidRegdate, 'yyyy-MM-dd HH:mm')}">
							</div>

							<!-- 배송처리 -->
							<div class="flex justify-center">
								<!-- 낙찰 + 배송 전 -->
								<a th:if="${item.bid.bidStatusIdx == 2 and item.payment != null and item.payment.payStatus == 'DONE' and item.delivery == null}"
  								 href="/mypage/sales"
   								 class="inline-flex items-center px-3 py-1.5 rounded-md bg-[#7CBD00] text-white text-[11px] font-medium hover:bg-[#6BAD00]">
    							배송처리 하기
								</a>

								<span th:if="${item.delivery != null and item.delivery.deliveryStatus == 'SHIPPING'}"
      								class="text-[11px] text-blue-600 font-medium">
    							배송중
								</span>

								<span th:if="${item.delivery != null and item.delivery.deliveryStatus == 'DELIVERED'}"
      								class="text-[11px] text-gray-600 font-medium">
    							수령완료
								</span>

								<span th:if="${item.bid.bidStatusIdx == 2 and (item.payment == null or item.payment.payStatus != 'DONE') and item.delivery == null}"
      								class="text-[11px] text-gray-400">
    							결제대기
								</span>

								<span th:if="${item.bid.bidStatusIdx != 2 and item.delivery == null}"
      								class="text-[11px] text-gray-400">
    							-
								</span>
							</div>
						</div>

						<!-- 모바일 뷰 -->
						<div class="md:hidden space-y-2">
							<!-- 제목 + 상태 -->
							<div class="flex justify-between items-start gap-2">
								<div>
									<a th:href="@{/auctions/{idx}(idx=${item.bid.auctionIdx})}"
										th:text="${item.bid.itemName}"
										class="text-sm font-semibold text-[#222222] hover:underline">
									</a>
									<div class="mt-0.5 text-[11px] text-gray-500"
										th:text="${item.bid.itemBrand != null ? item.bid.itemBrand : '-'}">
									</div>
								</div>
								<div class="text-right">
									<div class="text-[11px] text-gray-500"
										th:text="${item.bid.bidStatusName}"></div>
									<div class="text-[11px] text-gray-400"
										th:text="${#temporals.format(item.bid.bidRegdate, 'yyyy-MM-dd HH:mm')}"></div>
								</div>
							</div>

							<!-- 가격/배송처리 -->
							<div
								class="flex justify-between items-center text-[11px] text-gray-600">
								<div>
									<div class="text-gray-400">제안 가격</div>
									<div class="font-semibold text-[#222222]"
										th:text="${#numbers.formatInteger(item.bid.bidPrice, 0, 'COMMA') + '원'}"></div>
								</div>
								<div class="text-right">
									<!-- 낙찰 + 배송 전 -->
									<a th:if="${item.bid.bidStatusIdx == 2 
           										and item.payment != null 
           										and item.payment.payStatus == 'DONE' 
           										and item.delivery == null}"
   										href="/mypage/sales"
   										class="inline-flex items-center px-3 py-1.5 rounded-md bg-[#7CBD00] text-white text-[11px] font-medium hover:bg-[#6BAD00]">
    								배송처리 하기
									</a>

									<span th:if="${item.delivery != null and item.delivery.deliveryStatus == 'SHIPPING'}"
      									class="text-blue-600 font-medium">
    								배송중
									</span>

									<span th:if="${item.delivery != null and item.delivery.deliveryStatus == 'DELIVERED'}"
      									class="text-gray-600 font-medium">
    								수령완료
									</span>

									<span th:if="${item.bid.bidStatusIdx == 2 and (item.payment == null or item.payment.payStatus != 'DONE') and item.delivery == null}"
      									class="text-gray-400">
    								결제대기
									</span>

									<span th:if="${item.bid.bidStatusIdx != 2 and item.delivery == null}"
      									class="text-gray-400">
    								-
									</span>
								</div>
							</div>

						</div>

					</div>

				</div>

			</div>
		</div>

	</div>
</body>
</html>
