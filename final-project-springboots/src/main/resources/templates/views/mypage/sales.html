<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>내 판매 내역 - PickQ</title>
</head>
<body>
	<div layout:fragment="content">

		<div
			class="bg-white border border-gray-100 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] overflow-hidden">
			<!-- 헤더 -->
			<div class="px-6 py-5 border-b border-gray-100">
				<h2 class="text-lg sm:text-xl font-semibold text-[#222222]">내
					판매 내역</h2>
				<p class="mt-1 text-xs sm:text-sm text-[#767676]">역경매에서 판매한 거래의
					결제/배송 상태를 확인하고 배송 처리를 할 수 있습니다.</p>
			</div>

			<!-- 본문 -->
			<div class="px-4 py-4 sm:px-6 sm:py-5">

				<!-- 비어있을 때 -->
				<div th:if="${#lists.isEmpty(sales)}"
					class="py-10 text-center text-sm text-gray-400 border border-dashed border-gray-200 rounded-lg">
					판매 내역이 없습니다.</div>

				<!-- 데이터 있을 때 -->
				<div th:if="${!#lists.isEmpty(sales)}" class="space-y-3">

					<!-- 데스크탑 헤더 -->
					<div
						class="hidden md:grid md:grid-cols-[2.3fr_1.4fr_1.4fr_2.3fr_1.6fr_1.5fr_1.5fr_1.8fr_1.8fr] text-[11px] text-gray-500 px-2 pb-2 border-b border-gray-100">
						<span>상품명</span> <span class="text-right">결제 금액</span> <span>구매자
							이름</span> <span>배송지</span> <span>연락처</span> <span>배송 상태</span> <span>택배사</span>
						<span>운송장번호</span> <span class="text-center">결제일 / 배송처리</span>
					</div>

					<!-- 각 판매 행 -->
					<div th:each="sale : ${sales}"
						class="rounded-xl border border-gray-200 bg-gray-50 px-4 py-4 sm:px-5 sm:py-4">

						<!-- 데스크탑 뷰 -->
						<div
							class="hidden md:grid md:grid-cols-[2.3fr_1.4fr_1.4fr_2.3fr_1.6fr_1.5fr_1.5fr_1.8fr_1.8fr] items-center text-xs sm:text-sm gap-2">
							<!-- 상품명 -->
							<div class="truncate text-[#222222]" th:text="${sale.itemName}"></div>

							<!-- 결제 금액 -->
							<div class="text-right font-semibold text-[#222222]"
								th:text="${#numbers.formatInteger(sale.payAmount, 0, 'COMMA') + '원'}"></div>

							<!-- 구매자 이름 -->
							<div class="text-gray-700" th:text="${sale.buyerName}"></div>

							<!-- 배송지 -->
							<div class="text-gray-700"
								th:text="${sale.buyerAddr + ' ' + sale.buyerZipcode}"></div>

							<!-- 연락처 -->
							<div class="text-gray-700" th:text="${sale.buyerTel}"></div>

							<!-- 배송 상태 -->
							<div class="text-gray-700"
								th:text="${sale.deliveryStatus != null ? sale.deliveryStatus : '배송준비중'}"></div>

							<!-- 택배사 -->
							<div class="text-gray-600"
								th:text="${sale.courierCompany != null ? sale.courierCompany : '-'}"></div>

							<!-- 운송장번호 -->
							<div class="text-gray-600"
								th:text="${sale.trackingNumber != null ? sale.trackingNumber : '-'}"></div>

							<!-- 결제일 + 배송처리 -->
							<div class="flex flex-col items-center gap-1">
								<span class="text-[11px] text-gray-500"
									th:text="${#temporals.format(sale.payRegdate, 'yyyy-MM-dd HH:mm')}"></span>

								<div class="text-[11px]">
									<!-- 배송 시작 전: 운송장 입력 -->
									<button th:if="${sale.deliveryStatus == null}"
										th:attr="data-bid-idx=${sale.bidIdx}"
										onclick="openShipModal(this)"
										class="px-3 py-1.5 rounded-md bg-[#7CBD00] text-white text-[11px] font-medium hover:bg-[#6BAD00]">
										운송장 입력</button>
									<!-- 배송중 -->
									<span th:if="${sale.deliveryStatus == 'SHIPPING'}"
										class="text-blue-600 font-medium"> 배송중 </span>
									<!-- 수령완료 -->
									<span th:if="${sale.deliveryStatus == 'DELIVERED'}"
										class="text-gray-600 font-medium"> 수령완료 </span>
								</div>
							</div>
						</div>

						<!-- 모바일 뷰 -->
						<div class="md:hidden space-y-2">
							<!-- 상단: 상품 + 금액 + 상태 -->
							<div class="flex justify-between items-start gap-2">
								<div>
									<div class="text-sm font-semibold text-[#222222]"
										th:text="${sale.itemName}"></div>
									<div class="mt-0.5 text-[11px] text-gray-500">
										<span th:text="${sale.buyerName}"></span> · <span
											th:text="${sale.buyerTel}"></span>
									</div>
								</div>
								<div class="text-right text-[11px] text-gray-400">
									<div class="font-semibold text-[#222222]"
										th:text="${#numbers.formatInteger(sale.payAmount, 0, 'COMMA') + '원'}"></div>
									<div
										th:text="${#temporals.format(sale.payRegdate, 'yyyy-MM-dd HH:mm')}"></div>
								</div>
							</div>

							<!-- 배송 정보 -->
							<div class="grid grid-cols-2 gap-2 text-[11px] text-gray-600">
								<div>
									<div class="text-gray-400">배송지</div>
									<div th:text="${sale.buyerAddr + ' ' + sale.buyerZipcode}"></div>
								</div>
								<div>
									<div class="text-gray-400">배송 상태</div>
									<div
										th:text="${sale.deliveryStatus != null ? sale.deliveryStatus : '배송준비중'}"></div>
								</div>
								<div>
									<div class="text-gray-400">택배사</div>
									<div
										th:text="${sale.courierCompany != null ? sale.courierCompany : '-'}"></div>
								</div>
								<div>
									<div class="text-gray-400">운송장번호</div>
									<div
										th:text="${sale.trackingNumber != null ? sale.trackingNumber : '-'}"></div>
								</div>
							</div>

							<!-- 배송처리 버튼/상태 -->
							<div class="flex justify-end">
								<button th:if="${sale.deliveryStatus == null}"
									th:attr="data-bid-idx=${sale.bidIdx}"
									onclick="openShipModal(this)"
									class="px-3 py-1.5 rounded-md bg-[#7CBD00] text-white text-[11px] font-medium hover:bg-[#6BAD00]">
									운송장 입력</button>
								<span th:if="${sale.deliveryStatus == 'SHIPPING'}"
									class="text-[11px] text-blue-600 font-medium"> 배송중 </span> <span
									th:if="${sale.deliveryStatus == 'DELIVERED'}"
									class="text-[11px] text-gray-600 font-medium"> 수령완료 </span>
							</div>
						</div>

					</div>

				</div>
			</div>
		</div>

		<!-- 운송장 입력 모달 (원래 JS와 구조 유지) -->
		<div id="shipModal"
			style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border: 1px solid #ccc; border-radius: 8px; z-index: 50;">
			<h3 class="text-base font-semibold mb-3">운송장 정보 입력</h3>
			<input type="hidden" id="modalBidIdx" />

			<div class="mb-3">
				<label class="block mb-1 text-sm text-gray-700">택배사</label> <select
					id="courierCompany"
					class="w-full border border-gray-300 rounded-md px-2 py-1.5 text-sm">
					<option value="CJ대한통운">CJ대한통운</option>
					<option value="한진택배">한진택배</option>
					<option value="롯데택배">롯데택배</option>
					<option value="우체국택배">우체국택배</option>
					<option value="로젠택배">로젠택배</option>
				</select>
			</div>

			<div class="mb-4">
				<label class="block mb-1 text-sm text-gray-700">운송장번호</label> <input
					type="text" id="trackingNumber" placeholder="운송장번호 입력"
					class="w-full border border-gray-300 rounded-md px-2 py-1.5 text-sm" />
			</div>

			<div class="flex justify-end gap-2">
				<button onclick="submitShipping()"
					class="px-3 py-1.5 rounded-md bg-[#7CBD00] text-white text-[11px] sm:text-xs font-medium hover:bg-[#6BAD00]">
					배송 시작</button>
				<button onclick="closeShipModal()"
					class="px-3 py-1.5 rounded-md border border-gray-300 bg-white text-[11px] sm:text-xs text-gray-700 hover:bg-gray-50">
					취소</button>
			</div>
		</div>

		<!-- 기존 JS 그대로 유지 -->
		<script>
    function openShipModal(btn) {
      const bidIdx = btn.getAttribute("data-bid-idx");
      document.getElementById("modalBidIdx").value = bidIdx;
      document.getElementById("shipModal").style.display = "block";
    }

    function closeShipModal() {
      document.getElementById("shipModal").style.display = "none";
    }

    function submitShipping() {
      const bidIdx = document.getElementById("modalBidIdx").value;
      const courierCompany = document.getElementById("courierCompany").value;
      const trackingNumber = document.getElementById("trackingNumber").value;

      if (!trackingNumber.trim()) {
        alert("운송장번호를 입력해주세요.");
        return;
      }

      fetch("/api/payment/ship", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          bidIdx: bidIdx,
          courierCompany: courierCompany,
          trackingNumber: trackingNumber
        })
      })
        .then(res => {
          if (!res.ok) {
            return res.text().then(text => { throw new Error(text); });
          }
          return res.json();
        })
        .then(data => {
          alert("배송 처리가 완료되었습니다!");
          closeShipModal();
          location.reload();
        })
        .catch(err => {
          alert("오류가 발생했습니다: " + err.message);
        });
    }
  </script>

	</div>
</body>
</html>
