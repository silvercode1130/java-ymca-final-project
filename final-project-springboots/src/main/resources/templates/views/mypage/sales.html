<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/mypage_layout}">
<head>
<meta charset="UTF-8">
<title>나의 판매 내역 - PickQ</title>
</head>
<body>
	<main layout:fragment="content">

		<div
			class="bg-white border border-gray-100 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] overflow-hidden">

			<!-- 헤더 -->
			<div class="px-6 py-5 border-b border-gray-100">
				<h2 class="text-lg sm:text-xl font-semibold text-[#222222]">나의
					거래 - 판매 내역</h2>
				<p class="mt-1 text-xs sm:text-sm text-[#767676]">판매자로 참여한 주문의
					결제/배송/정산 상태를 확인할 수 있습니다.</p>
			</div>

			<!-- 본문: 주문 카드 리스트 -->
			<div class="px-4 py-4 sm:px-6 sm:py-5">

				<!-- 비어있을 때 -->
				<div th:if="${#lists.isEmpty(orders)}"
					class="py-10 text-center text-sm text-gray-400 border border-dashed border-gray-200 rounded-lg">
					판매한 주문이 없습니다.</div>

				<!-- 데이터 있을 때 -->
				<div th:if="${!#lists.isEmpty(orders)}" class="space-y-3">

					<div th:each="order : ${orders}"
						class="cursor-pointer rounded-xl border border-gray-200 bg-gray-50 px-4 py-4 sm:px-5 sm:py-4 hover:border-[#7CBD00] transition-colors"
						th:onclick="|location.href='/mypage/sales/${order.orderIdx}'|">

						<!-- 제목 + 상태 -->
						<div class="mb-3 flex items-center justify-between gap-3">
							<div>
								<!-- 경매 제목 -->
								<div class="text-sm font-semibold text-[#222222]"
									th:text="${order.auctionTitle}">프로 축구공 FIFA 공인구 구함</div>
								<!-- 구매자 닉네임 -->
								<div class="mt-1 text-[11px] text-[#999999]">
									구매자 <span th:text="${order.buyerNickname}">buyer123</span>
								</div>
							</div>

							<!-- 주문 상태 배지 -->
							<div>
								<span
									class="inline-flex items-center rounded-full px-3 py-1 text-[11px] font-semibold"
									th:classappend="
                      ${order.orderStatusCode} == 'CREATED' ? ' bg-amber-50 text-amber-700' :
                      (${order.orderStatusCode} == 'PAID' ? ' bg-[#E6F4D6] text-[#4C7C00]' :
                      (${order.orderStatusCode} == 'CANCELED' ? ' bg-gray-100 text-gray-500' :
                      ' bg-gray-100 text-gray-600')) "
									th:text="${order.orderStatusName}"> 결제대기 </span>
							</div>
						</div>

						<!-- 정보 4칸 -->
						<div
							class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-xs sm:text-sm">
							<div>
								<div class="text-[#9ca3af]">결제 금액</div>
								<div class="mt-0.5 font-semibold text-[#222222]"
									th:text="${#numbers.formatInteger(order.orderAmount, 0, 'COMMA') + '원'}">
									50,000원</div>
							</div>
							<div>
								<div class="text-[#9ca3af]">결제 상태</div>
								<div class="mt-0.5 font-semibold text-[#222222]"
									th:text="${order.paymentStatusName}">결제완료</div>
							</div>
							<div>
								<div class="text-[#9ca3af]">배송 상태</div>
								<div class="mt-0.5 text-[#222222]"
									th:text="${order.shippingStatusName}">배송전</div>
							</div>
							<div>
								<div class="text-[#9ca3af]">주문일</div>
								<div class="mt-0.5 text-[#222222]"
									th:text="${#temporals.format(order.orderRegdate, 'yyyy-MM-dd')}">
									2026-03-10</div>
							</div>
						</div>

						<!-- 하단 버튼 영역 -->
						<div class="mt-3 flex justify-end gap-2">
							<!-- 결제완료 + 배송전일 때만 송장등록/배송시작 버튼 -->
							<button type="button"
								th:if="${order.orderStatusCode == 'PAID' and order.shippingStatusCode == 'READY'}"
								class="px-3 py-1.5 rounded-lg bg-[#7CBD00] text-white text-[11px] sm:text-xs font-semibold hover:bg-[#6AA500]"
								th:onclick="|event.stopPropagation(); location.href='/mypage/sales/${order.orderIdx}/ship'|">
								송장등록/배송시작</button>

							<!-- 항상 노출되는 상세보기 -->
							<button type="button"
								class="px-3 py-1.5 rounded-lg border border-gray-200 text-[11px] sm:text-xs text-gray-700 bg-white hover:bg-gray-50"
								th:onclick="|event.stopPropagation(); location.href='/mypage/sales/${order.orderIdx}'|">
								상세보기</button>
						</div>

					</div>
				</div>

			</div>
		</div>

	</main>
</body>
</html>
