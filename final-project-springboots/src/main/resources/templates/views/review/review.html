<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</head>
<body>
	<form class="review">
		<div class="reviewTitle">
			리뷰관리 <br>
			거래 후 작성한 리뷰 목록
		</div>
		
		<div>
			<table id="myReviewTable" name="table" border="1">
				<thead>
					<th:if>
						<tr>
							<th>거래 제목</th>
							<th>상품명</th> 
							<th>별점</th>      
							<th>리뷰 작성일</th>
		                    <th>관리</th>
						</tr>
					</th:if>
				</thead>
				<tbody>
					<tr th:each="review : ${reviewList}">
						<td th:text="${review.auctionTitle}"></td>
						<td th:text="${review.itemName}"></td>
						<td th:with="star=${review.reviewStar}">
							<!-- 채운 별 -->
						    <span th:each="i : ${#numbers.sequence(1, star)}">
						        <i class="bi bi-star-fill" style="color: gold;"></i>
						    </span>
						    <!-- 빈 별 -->
						    <span th:if="${star < 5}" th:each="i : ${#numbers.sequence(1, 5 - star)}">
						        <i class="bi bi-star"></i> 
						    </span>
						</td>
						<td th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd HH:mm')}"></td>
						<td>
							<button type="button" th:onclick="|location.href='@{/review/reviewDetail(reviewIdx=${review.reviewIdx})}'|">
							    상세보기
							</button>
                        	<button th:if="${session.loginUser.memRoleIdx == 2}">
                        		삭제
                        	</button>
						</td>
					</tr>
				</tbody>
			</table>
		</div> 
		
		<div>
			<input type="button" value="리뷰 남기기" onclick="location.href='review/reviewWrite'">
		</div>
		
		<div class="review">
			<div class="reviewTitle">
				거래 후 내가 받은 리뷰
			</div>
		</div>
		
		<div class="starAverage" th:with="avg=${avgRating != null ? avgRating : 0}">
		    별점 평균 
		    <!-- 채운 별 -->
		    <span th:each="i : ${#numbers.sequence(1, T(java.lang.Math).floor(avg))}">
		        <i class="bi bi-star-fill" style="color: gold;"></i>
		    </span>
		    <!-- 반개 별 -->
		    <span th:if="${avg % 1 >= 0.5}">
		        <i class="bi bi-star-half" style="color: gold;"></i>
		    </span> 
		</div>
		
		<div>
			<table id="receivedReviewTable" name="table" border="1">
				<thead>
					<th:if>
						<tr>
							<th>거래 제목</th>
							<th>상품명</th> 
							<th>별점</th>      
							<th>리뷰 작성일</th>
		                    <th>관리</th>
						</tr>
					</th:if>
				</thead>
				<tbody>
					<tr th:each="review : ${receivedReviewList}">
						<td th:text="${review.auctionTitle}"></td>
						<td th:text="${review.itemName}"></td>
						<td th:with="star=${review.reviewStar}">
							<!-- 채운 별 -->
						    <span th:each="i : ${#numbers.sequence(1, star)}">
						        <i class="bi bi-star-fill" style="color: gold;"></i>
						    </span>
						    <!-- 빈 별 -->
						    <span th:if="${star < 5}" th:each="i : ${#numbers.sequence(1, 5 - star)}">
						        <i class="bi bi-star"></i> 
						    </span>
						</td>
						<td th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd HH:mm')}"></td>
						<td>
							<button type="button" th:onclick="|location.href='@{/review/reviewDetail(reviewIdx=${review.reviewIdx})}'|">
							    상세보기
							</button>
                        	<button th:if="${session.loginUser.memRoleIdx == 2}">
                        		삭제
                        	</button>
						</td>
					</tr>
				</tbody>
			</table>
		</div> 
	
	</form>
</body>
</html>
