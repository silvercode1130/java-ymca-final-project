<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</head>
<body>
	<form class="review">
		<div class="reviewTitle">
			리뷰관리 <br>
			거래 후 작성한 리뷰 목록
		</div>
		
		<div>
			<table id="myReviewTable" name="table" border="1">
				<thead>
					<th:if>
						<tr>
							<th>거래 제목</th>
							<th>상품명</th> 
							<th>별점</th>      
							<th>리뷰 작성일</th>
		                    <th>관리</th>
						</tr>
					</th:if>
				</thead>
				<tbody>
					<tr th:each="review : ${reviewList}">
						<td th:text="${review.auctionTitle}"></td>
						<td th:text="${review.itemName}"></td>
						<td th:with="star=${review.reviewStar}">
							<!-- 채운 별 -->
						    <span th:each="i : ${#numbers.sequence(1, star)}">
						        <i class="bi bi-star-fill" style="color: gold;"></i>
						    </span>
						    <!-- 빈 별 -->
						    <span th:if="${star < 5}" th:each="i : ${#numbers.sequence(1, 5 - star)}">
						        <i class="bi bi-star" style="color: gold;"></i> 
						    </span>
						</td>
						<td th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd HH:mm')}"></td>
						<td>
							<button type="button" th:onclick="|location.href='@{/review/reviewDetail(reviewIdx=${review.reviewIdx})}'|">
							    상세보기
							</button>
                        	<button th:if="${session.loginUser.memRoleIdx == 2}">
                        		삭제
                        	</button>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(reviewList)}">
					    <td colspan="5">작성한 리뷰가 없습니다</td>
					</tr>
				</tbody>
			</table>
		</div> 
		
		<div>
			<input type="button" value="리뷰 남기기" onclick="location.href='review/reviewWrite'">
		</div>
		
		<div class="review">
			<div class="reviewTitle">
				거래 후 내가 받은 리뷰
			</div>
		</div>
		
		<div class="starAverage"
		     th:with="
		        avg=${avgRating != null ? avgRating : 0.0},
		        full=${T(java.lang.Math).floor(avg).intValue()},
		        hasHalf=${avg - T(java.lang.Math).floor(avg) > 0},
		        half=${hasHalf ? 1 : 0},
		        empty=${5 - full - half}">
		
			<!-- 수정 시 내가 참고용으로 만든 것!! [지우지 말아주세요 - 디버깅할 때 쓰는 참고자료입니당] -->
		    <!-- <div class="reviewTitle">별점 평균</div>
		    <div>평균값 확인: <span th:text="${avg}"></span></div> -->
		
		    <!-- 꽉 찬 별 -->
		    <span th:if="${full > 0}" th:each="i : ${#numbers.sequence(1, full)}">
		        <i class="bi bi-star-fill" style="color: gold;"></i>
		    </span>
		
		    <!-- 반쪽 별 -->
		    <span th:if="${half == 1}">
		        <i class="bi bi-star-half" style="color: gold;"></i>
		    </span>
		
		    <!-- 빈 별 -->
		    <span th:if="${empty > 0}" th:each="i : ${#numbers.sequence(1, empty)}">
		        <i class="bi bi-star" style="color: gold;"></i>
		    </span>
		</div>
		
		<div>
			<table id="receivedReviewTable" name="table" border="1">
				<thead>
					<th:if>
						<tr>
							<th>거래 제목</th>
							<th>상품명</th> 
							<th>별점</th>      
							<th>리뷰 작성일</th>
		                    <th>관리</th>
						</tr>
					</th:if>
				</thead>
				<tbody>
					<tr th:each="review : ${receivedReviewList}">
						<td th:text="${review.auctionTitle}"></td>
						<td th:text="${review.itemName}"></td>
						<td th:with="star=${review.reviewStar}">
							<!-- 채운 별 -->
						    <span th:each="i : ${#numbers.sequence(1, star)}">
						        <i class="bi bi-star-fill" style="color: gold;"></i>
						    </span>
						    <!-- 빈 별 -->
						    <span th:if="${star < 5}" th:each="i : ${#numbers.sequence(1, 5 - star)}">
						        <i class="bi bi-star" style="color: gold;"></i> 
						    </span>
						</td>
						<td th:text="${#temporals.format(review.reviewRegdate, 'yyyy-MM-dd HH:mm')}"></td>
						<td>
							<button type="button" th:onclick="|location.href='@{/review/reviewDetail(reviewIdx=${review.reviewIdx})}'|">
							    상세보기
							</button>
                        	<button th:if="${session.loginUser.memRoleIdx == 2}">
                        		삭제
                        	</button>
						</td>
						<tr th:if="${#lists.isEmpty(receivedReviewList)}">
						    <td colspan="5">받은 리뷰가 없습니다</td>
						</tr>
				</tbody>
			</table>
		</div> 
	
	</form>
</body>
</html>
