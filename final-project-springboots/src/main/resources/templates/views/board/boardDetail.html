<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title th:text="${board.boardTitle} + ' - PickQ'">게시글 상세</title>
<!-- 페이지 전용 스타일만 -->
</head>
<body>
<th:block layout:fragment="content">
<div class="container py-4" style="max-width: 860px;">
  <div class="mt-3">
    <a class="btn btn-ghost btn-sm" th:href="${backUrl}">← 목록으로</a>
  </div>
  <!-- 게시글 본문 -->
  <div class="board-card">
    <div class="board-title" th:text="${board.boardTitle}"></div>
    <div class="board-meta">
      <span><i class="bi bi-collection-fill"></i><a th:href="@{/boards/{tc}(tc=${board.boardTypeCode})}"
                  th:text="${board.boardTypeName}"
                  style="color:#c6f135; text-decoration:none;"></a></span>
      <span><i class="bi bi-pen-fill"></i><span th:text="${board.memNickname != null} ? ${board.memNickname} : ${board.memId}">작성자</span></span>
      <span><i class="bi bi-search"></i><span th:text="${board.boardViewCount}">0</span></span>
      <span><i class="bi bi-clock-history"></i><span th:text="${#temporals.format(board.boardRegdate, 'yyyy-MM-dd HH:mm')}"></span></span>
    </div>
    <hr class="divider">
    <div class="board-content" th:utext="${board.boardContent}"></div>
    <!-- 게시글 좋아요 -->
    <div class="mt-3">
      <form th:action="@{/boards/{tc}/{id}/like(tc=${board.boardTypeCode}, id=${board.boardIdx})}" method="post" style="display:inline">
        <input type="hidden" name="replyPage" th:value="${replyPage}">
        <input type="hidden" name="sortType" th:value="${sortType}">
        <button type="submit" class="btn btn-ghost btn-sm"
                th:classappend="${session['boardLike_' + board.boardIdx] != null} ? ' btn-liked' : ''">
          ❤️ <span th:text="${board.boardLike}">0</span>
        </button>
      </form>
    </div>
  </div>

  <!-- 수정/삭제 버튼 (작성자 본인만) -->
  <div class="d-flex gap-2 mb-4"
       th:if="${session.loginUser != null and session.loginUser.memIdx == board.memIdx}">
    <a th:href="@{/boards/{tc}/{id}/edit(tc=${board.boardTypeCode}, id=${board.boardIdx})}"
       class="btn btn-ghost btn-sm"><i class="bi bi-pencil-fill">수정</i></a>
    <form th:action="@{/boards/{tc}/{id}/delete(tc=${board.boardTypeCode}, id=${board.boardIdx})}"
          method="post" style="display:inline">
      <button type="submit" class="btn btn-danger-soft btn-sm"
              onclick="return confirm('삭제하시겠습니까?')"><i class="bi bi-trash3-fill">삭제</i></button>
    </form>
  </div>

  <!-- 댓글 섹션 -->
  <div class="reply-section">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5 class="mb-0"><i class="bi bi-chat-fill">댓글</i><span th:text="${totalReplies}">0</span>개</h5>
      <!-- 정렬 선택 -->
      <div>
        <a th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=1, sortType='oldest')}"
           class="btn btn-sm"
           th:classappend="${sortType == 'oldest'} ? ' btn-lime' : ' btn-ghost'">등록순</a>
        <a th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=1, sortType='latest')}"
           class="btn btn-sm"
           th:classappend="${sortType == 'latest'} ? ' btn-lime' : ' btn-ghost'">최신순</a>
      </div>
    </div>

    <!-- 대댓글 초과 알림 (alert) -->
    <th:block th:if="${param.replyLimitExceeded != null}">
      <script>alert('대댓글은 최대 3개까지만 작성할 수 있습니다.');</script>
    </th:block>
    <div th:each="r : ${replies}" class="reply-item">
      <div class="d-flex align-items-start gap-2">
        <span th:style="'margin-left:' + (${r.replyDepth} * 20) + 'px'">
          <span th:if="${r.replyDepth > 0}" style="color:#c6f135; margin-right:4px">↳</span>
        </span>
        <div class="flex-grow-1">
          <div class="reply-content" th:text="${r.replyContent}"></div>
          <!-- 인라인 수정 폼 -->
          <div th:id="'editForm-' + ${r.replyIdx}" style="display:none; margin-top:.5rem;">
            <form th:action="@{/boards/{tc}/{id}/replies/{rid}/edit(tc=${typeCode}, id=${board.boardIdx}, rid=${r.replyIdx})}"
                  method="post" class="reply-form"
                  onsubmit="return validateReply(this.querySelector('textarea'))">
              <input type="hidden" name="replyPage" th:value="${replyPage}">
              <input type="hidden" name="sortType" th:value="${sortType}">
              <textarea name="replyContent" rows="2" class="form-control form-control-sm mb-1"
                        th:text="${r.replyContent}"></textarea>
              <button type="submit" class="btn btn-lime btn-sm">저장</button>
              <button type="button" class="btn btn-ghost btn-sm"
                      th:onclick="'toggleEditForm(' + ${r.replyIdx} + ')'">취소</button>
            </form>
          </div>
          <div class="reply-meta d-flex gap-3">
            <span th:text="${r.memNickname != null} ? ${r.memNickname} : ${r.memId}">작성자</span>
            <span th:text="${#temporals.format(r.replyRegdate, 'MM-dd HH:mm')}"></span>
            <!-- 로그인 O -->
            <th:block th:if="${session.loginUser != null}">
              <span th:if="${r.replyDepth < 3}"
                    class="reply-toggle"
                    th:onclick="'toggleReplyForm(' + ${r.replyIdx} + ')'">↩ 답글</span>
              <span th:if="${r.replyDepth >= 3}"
                    class="reply-toggle"
                    onclick="alert('더 이상 답글을 작성할 수 없습니다.')">↩ 답글</span>
            </th:block>
            <!-- 로그인 X -->
            <th:block th:if="${session.loginUser == null}">
              <a th:if="${r.replyDepth < 3}"
                 th:href="@{/members/login(redirect='/boards/' + ${typeCode} + '/' + ${board.boardIdx} + '?from=' + ${#strings.defaultString(param.from, '')} + '&page=' + ${#strings.defaultString(param.page, '1')} + '&replyPage=' + ${replyPage} + '&openReply=' + ${r.replyIdx})}"
                 class="reply-toggle" style="text-decoration:none;">↩ 답글</a>
              <span th:if="${r.replyDepth >= 3}"
                    class="reply-toggle"
                    onclick="alert('더 이상 답글을 작성할 수 없습니다.')">↩ 답글</span>
            </th:block>
          </div>
          <div th:id="'replyForm-' + ${r.replyIdx}" style="display:none; margin-top:.5rem;">
            <form th:action="@{/boards/{tc}/{id}/replies(tc=${typeCode}, id=${board.boardIdx})}"
                  method="post" class="reply-form"
                  onsubmit="return validateReply(this.querySelector('textarea'))">
              <input type="hidden" name="parentReplyIdx" th:value="${r.replyIdx}">
              <input type="hidden" name="replyPage" th:value="${replyPage}">
              <input type="hidden" name="sortType" th:value="${sortType}">
              <input type="hidden" name="from" th:value="${param.from}">
              <input type="hidden" name="page" th:value="${param.page}">
              <textarea name="replyContent" rows="2" class="form-control form-control-sm mb-1"
                        placeholder="답글을 입력하세요"></textarea>
              <button type="submit" class="btn btn-lime btn-sm">등록</button>
              <button type="button" class="btn btn-ghost btn-sm"
                      th:onclick="'toggleReplyForm(' + ${r.replyIdx} + ')'">취소</button>
            </form>
          </div>
        </div>
        <!-- 댓글 좋아요 (모든 댓글에 표시) -->
        <form th:action="@{/boards/{tc}/{id}/replies/{rid}/like(tc=${typeCode}, id=${board.boardIdx}, rid=${r.replyIdx})}" method="post" style="display:inline">
          <input type="hidden" name="replyPage" th:value="${replyPage}">
          <input type="hidden" name="sortType" th:value="${sortType}">
          <button type="submit" class="btn btn-ghost btn-sm">
            ❤️ <span th:text="${r.replyLike}">0</span>
          </button>
        </form>
        <div th:if="${session.loginUser != null and session.loginUser.memIdx == r.memIdx}"
             class="d-flex gap-1">
          <!-- 수정 버튼 -->
          <button type="button" class="btn btn-ghost btn-sm"
                  th:onclick="'toggleEditForm(' + ${r.replyIdx} + ')'">✏️</button>
          <!-- 삭제 버튼 -->
          <form th:action="@{/boards/{tc}/replies/{rid}/delete(tc=${typeCode}, rid=${r.replyIdx})}"
                method="post">
            <input type="hidden" name="boardIdx" th:value="${board.boardIdx}">
            <button type="submit" class="btn btn-danger-soft btn-sm"
                    onclick="return confirm('삭제하시겠습니까?')">✕</button>
          </form>
        </div>
      </div>
    </div>

    <div th:if="${session.loginUser != null}" class="mt-3">
      <form th:action="@{/boards/{tc}/{id}/replies(tc=${typeCode}, id=${board.boardIdx})}"
            method="post" class="reply-form"
            onsubmit="return validateReply(this.querySelector('textarea'))">
        <input type="hidden" name="replyPage" th:value="${replyPage}">
        <input type="hidden" name="sortType" th:value="${sortType}">
        <input type="hidden" name="from" th:value="${param.from}">
        <input type="hidden" name="page" th:value="${param.page}">
        <textarea name="replyContent" rows="3" class="form-control mb-2"
                  placeholder="댓글을 입력하세요"></textarea>
        <button type="submit" class="btn btn-lime btn-sm"><i class="bi bi-chat-dots"> 댓글 등록</i></button>
      </form>
    </div>
    <div th:if="${session.loginUser == null}" class="mt-3" style="color:#666; font-size:.9rem;">
      댓글을 작성하려면 <a th:href="@{/members/login(redirect='/boards/' + ${typeCode} + '/' + ${board.boardIdx} + '?from=' + ${#strings.defaultString(param.from, '')} + '&page=' + ${#strings.defaultString(param.page, '1')})}" style="color:#c6f135">로그인</a>이 필요합니다. <!-- 수정되었음 -->

    </div>

    <!-- 댓글 페이지네이션 -->
    <div class="pagination-wrap" th:if="${totalReplyPages > 1}">
      <a th:if="${replyBlockStart > 1}"
         th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=${replyBlockStart - 1}, sortType=${sortType})}"
         class="page-btn">이전</a>
      <a th:each="p : ${#numbers.sequence(replyBlockStart, replyBlockEnd)}"
         th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=${p}, sortType=${sortType})}"
         th:text="${p}"
         class="page-btn"
         th:classappend="${p == replyPage} ? ' active' : ''"></a>
      <a th:if="${replyBlockEnd < totalReplyPages}"
         th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx}, replyPage=${replyBlockEnd + 1}, sortType=${sortType})}"
         class="page-btn">다음</a>
    </div>
  </div>



</div>

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/reply.js}"></script>
</th:block>
</body>
</html>
