<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title	th:text="${currentType != null} ? ${currentType.boardTypeName} + ' - PickQ' : '커뮤니티 - PickQ'">커뮤니티 - PickQ</title>
<link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/board.css}">
</head>
<body>
<th:block layout:fragment="content">

	<!-- 본문 레이아웃 -->
	<div class="layout">
	
		<!-- 사이드바 -->
		<aside class="sidebar">
			<div class="sidebar-title">종목별 게시판</div>
			<a href="/boards" class="sidebar-item"
				th:classappend="${typeCode == null} ? ' active' : ''">전체 게시판</a> <a
				th:each="bt : ${boardTypes}"
				th:href="@{/boards/{tc}(tc=${bt.boardTypeCode})}"
				th:text="${bt.boardTypeName}" class="sidebar-item"
				th:classappend="${typeCode != null and typeCode == bt.boardTypeCode} ? ' active' : ''">
			</a>
		</aside>
	
		<!-- 메인 -->
		<div class="main-content">
	
				<!-- 헤더 -->
			    <div class="page-header">
			      <div class="page-title"
			           th:text="${currentType != null} ? ${currentType.boardTypeName} : '전체 게시판'">전체 게시판</div>
			      <!-- 카테고리 목록: 바로 글쓰기 / 전체 목록: 카테고리 선택 모달 -->
			      <!-- 로그인 O: 기존 동작 -->
			      <span th:if="${session.loginUser != null}">
			        <a th:if="${typeCode != null}"
			           th:href="@{/boards/{tc}/new(tc=${typeCode})}"
			           class="btn-write">+ 글쓰기</a>
					<button th:if="${typeCode == null}"
						class="btn-write" style="cursor: pointer;"
						onclick="document.getElementById('categoryModal').style.display='flex'">+ 글쓰기</button>
				</span>
			      <!-- 로그인 X: 로그인 페이지로 이동 -->
			      <span th:if="${session.loginUser == null}">
			        <a th:if="${typeCode != null}"
			           th:href="@{/members/login(redirect='/boards/' + ${typeCode} + '/new')}"
			           class="btn-write">+ 글쓰기</a>
			        <a th:if="${typeCode == null}"
			           th:href="@{/members/login(redirect='/boards?page=' + ${currentPage})}"
			           class="btn-write">+ 글쓰기</a>
			      </span>
			</div>
	
			<!-- 카테고리 선택 모달 (전체 목록 글쓰기용) -->
			<div id="categoryModal"
				style="display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, .6); 
				z-index: 9999; align-items: center; justify-content: center;"
				onclick="if(event.target===this) this.style.display='none'">
				<div style="background: #1e1e1e; border: 1px solid #333; border-radius: 12px; 
							padding: 1.5rem; min-width: 280px; max-width: 360px; width: 90%;">
					<div style="color: #c6f135; font-weight: 700; font-size: 1rem; margin-bottom: 1rem;">게시판 선택</div>
					<div style="display: flex; flex-direction: column; gap: .4rem;">
						<a th:each="bt : ${boardTypes}"
							th:href="@{/boards/{tc}/new(tc=${bt.boardTypeCode}, from='all')}"
							th:text="${bt.boardTypeName}"
							style="display: block; padding: .5rem .8rem; background: #2a2a2a; border-radius: 8px; 
									color: #e0e0e0; text-decoration: none; font-size: .9rem;"
							onmouseover="this.style.background='#c6f135'; this.style.color='#121212';"
							onmouseout="this.style.background='#2a2a2a'; this.style.color='#e0e0e0';">
						</a>
					</div>
					<button	onclick="document.getElementById('categoryModal').style.display='none'"
							style="margin-top: 1rem; width: 100%; background: transparent; border: 1px solid #444; 
									color: #aaa; border-radius: 8px; padding: .4rem; cursor: pointer;">취소</button>
				</div>
			</div>
	
			<!-- 검색 -->
			<form
				th:action="${typeCode != null} ? '/boards/' + ${typeCode} : '/boards'" method="get" class="search-bar">
				<select name="searchType">
					<option value="all"		th:selected="${searchType == null or searchType == 'all'}">제목</option>
					<option value="title" 	th:selected="${searchType == 'title'}">제목</option>
					<option value="content" th:selected="${searchType == 'content'}">내용</option>
					<option value="writer" 	th:selected="${searchType == 'writer'}">작성자</option>
				</select> <input type="text" name="keyword" placeholder="검색어를 입력하세요" th:value="${keyword}">
				<button type="submit" class="btn-search">검색</button>
			</form>
	
			<!-- 게시글 테이블 -->
			<table class="board-table">
				<thead>
					<tr>
						<th style="width: 55px; text-align: center;">번호</th>
						<th th:if="${typeCode == null}"	style="width: 80px; text-align: center;">종목</th>
						<th>제목</th>
						<th style="width: 120px;">작성자</th>
						<th style="width: 65px; text-align: center;">조회</th>
						<th style="width: 100px; text-align: center;">작성일</th>
					</tr>
				</thead>
				<tbody>
					<tr th:if="${#lists.isEmpty(boards)}">
						<td th:colspan="${typeCode == null} ? 6 : 5"
							class="text-center py-4" style="color: #555;">게시글이 없습니다.</td>
					</tr>
					<tr th:each="b, stat : ${boards}">
						<td style="text-align: center; color: #666;" th:text="${stat.count}"></td>
						<td th:if="${typeCode == null}" style="text-align: center;">
							<a th:href="@{/boards/{tc}(tc=${b.boardTypeCode})}"
							class="badge-type" th:text="${b.boardTypeName}"></a>
						</td>
						<td>
							<a th:href="${typeCode == null} ? @{/boards/{tc}/{id}(tc=${b.boardTypeCode}, id=${b.boardIdx}, from='all', page=${currentPage})} : @{/boards/{tc}/{id}(tc=${b.boardTypeCode}, id=${b.boardIdx}, page=${currentPage})}">
								<span th:text="${b.boardTitle}"></span>
							</a>
							<span th:if="${b.hasImage}" style="font-size:.8rem; color:#aaa;"><i class="bi bi-image-fill"></i></span>
							<span th:if="${b.replyCount > 0}" class="reply-count"><i class="bi bi-chat-dots"></i>
								<span th:text="${b.replyCount}"></span>
							</span>
						</td>
						<td>
							<span th:text="${b.memNickname != null} ? ${b.memNickname} : ${b.memId}"></span>
						</td>
						<td style="text-align: center;" th:text="${b.boardViewCount}"></td>
						<td style="text-align: center;"	th:text="${#temporals.format(b.boardRegdate, 'yyyy-MM-dd')}"></td>
					</tr>
				</tbody>
			</table>
			
			<!-- 페이지네이션 -->
		    <div class="pagination-wrap">
		      <!-- 이전 블록 -->
		      <a th:if="${blockStart > 1}"
		         th:href="@{${typeCode != null ? '/boards/' + typeCode : '/boards'}(page=${blockStart - 1}, keyword=${keyword}, searchType=${searchType})}"
		         class="page-btn">이전</a>
		
		      <!-- 페이지 번호 -->
		      <a th:each="p : ${#numbers.sequence(blockStart, blockEnd)}"
		         th:href="@{${typeCode != null ? '/boards/' + typeCode : '/boards'}(page=${p}, keyword=${keyword}, searchType=${searchType})}"
		         th:text="${p}"
		         class="page-btn"
		         th:classappend="${p == currentPage} ? ' active' : ''"></a>
		
		      <!-- 다음 블록 -->
		      <a th:if="${blockEnd < totalPages}"
		         th:href="@{${typeCode != null ? '/boards/' + typeCode : '/boards'}(page=${blockEnd + 1}, keyword=${keyword}, searchType=${searchType})}"
		         class="page-btn">다음</a>
		    </div>
	
		</div>
	</div>
<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
</th:block>
</body>
</html>
