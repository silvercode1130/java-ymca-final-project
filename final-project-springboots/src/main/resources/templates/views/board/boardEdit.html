<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>게시글 수정 - PickQ</title>
<link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/board.css}">
</head>
<body>

<div class="container py-5">
  <div class="write-card">
    <h4>✏️ 게시글 수정</h4>

    <form th:action="@{/boards/{tc}/{id}/edit(tc=${typeCode}, id=${board.boardIdx})}" method="post">

      <div class="mb-3">
        <label>제목</label>
        <input type="text" name="boardTitle" class="form-control"
               th:value="${board.boardTitle}" required maxlength="200">
      </div>

      <div class="mb-4">
        <label>내용</label>
        <textarea name="boardContent" class="form-control" rows="12"
                  required th:text="${board.boardContent}"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-lime">💾 저장</button>
        <a th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx})}"
           class="btn btn-ghost">취소</a>
      </div>

    </form>
  </div>
</div>

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
