<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title>게시글 수정 - PickQ</title>
<link rel="stylesheet" th:href="@{/css/board.css}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css">
</head>
<body>
<th:block layout:fragment="content">
<div class="container py-5">
  <div class="write-card">
    <h4>✏️ 게시글 수정</h4>

    <form id="editForm" th:action="@{/boards/{tc}/{id}/edit(tc=${typeCode}, id=${board.boardIdx})}" method="post">

      <div class="mb-3">
        <label>제목</label>
        <input type="text" name="boardTitle" class="form-control"
               th:value="${board.boardTitle}" required maxlength="200">
      </div>

      <div class="mb-4">
        <label>내용</label>
        <textarea id="boardContent" name="boardContent" class="form-control"
                  th:utext="${board.boardContent}"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-lime">💾 저장</button>
        <a th:href="@{/boards/{tc}/{id}(tc=${typeCode}, id=${board.boardIdx})}"
           class="btn btn-ghost">취소</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/lang/summernote-ko-KR.min.js"></script>
<script th:src="@{/js/summernote.js}"></script>
<script>
  initSummernote('boardContent');
  bindSummernoteSubmit('editForm', 'boardContent');
</script>
</th:block>
</body>
</html>
