<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${currentType.boardTypeName} + ' 글쓰기 - PickQ'">글쓰기 - PickQ</title>
<link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/board.css}">
</head>
<body>

<div class="container py-5">
  <div class="write-card">
    <h4>✏️ 게시글 작성</h4>

    <form id="writeForm" th:action="@{/boards/{tc}(tc=${typeCode})}" method="post">
	<!-- 출처 전달 (전체목록=all, 카테고리=typeCode) -->
      <input type="hidden" id="fromInput" name="from" th:value="${from}">

      <!-- 카테고리 드롭다운 -->
      <div class="mb-3">
        <label>카테고리</label>
        <select id="categorySelect" class="form-select" onchange="changeCategory(this.value)">
          <option th:each="bt : ${boardTypes}"
                  th:value="${bt.boardTypeCode}"
                  th:text="${bt.boardTypeName}"
                  th:selected="${bt.boardTypeCode == typeCode}">
          </option>
        </select>
      </div>

      <div class="mb-3">
        <label>제목</label>
        <input type="text" name="boardTitle" class="form-control"
               placeholder="제목을 입력하세요" required maxlength="200">
      </div>

      <div class="mb-4">
        <label>내용</label>
        <textarea name="boardContent" class="form-control" rows="12"
                  placeholder="내용을 입력하세요" required></textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-lime">📝 등록</button>
        <a th:href="${from == 'all'} ? '/boards' : '/boards/' + ${typeCode}" class="btn btn-ghost">취소</a>
      </div>

    </form>
  </div>
</div>

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
<script>
	function changeCategory(typeCode) {
	  document.getElementById('writeForm').action = '/boards/' + typeCode;
	}
</script>
</body>
</html>
