<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${currentType.boardTypeName} + ' 글쓰기 - PickQ'">글쓰기 - PickQ</title>
<link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
<style>

</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">⚡ PickQ</a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <a class="nav-link" href="/boards">커뮤니티</a>
      <a class="nav-link" href="/auctions">경매</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="write-card">
    <h4>✏️ 게시글 작성</h4>
    <div class="board-badge" th:text="${currentType.boardTypeName}">카테고리</div>

    <form th:action="@{/boards/{tc}(tc=${typeCode})}" method="post">

      <div class="mb-3">
        <label>제목</label>
        <input type="text" name="boardTitle" class="form-control"
               placeholder="제목을 입력하세요" required maxlength="200">
      </div>

      <div class="mb-4">
        <label>내용</label>
        <textarea name="boardContent" class="form-control" rows="12"
                  placeholder="내용을 입력하세요" required></textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-lime">📝 등록</button>
        <a th:href="@{/boards/{tc}(tc=${typeCode})}" class="btn btn-ghost">취소</a>
      </div>

    </form>
  </div>
</div>

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
