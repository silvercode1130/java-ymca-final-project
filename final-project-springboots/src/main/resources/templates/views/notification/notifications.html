<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<title>알림 - PickQ</title>
</head>
<body>
	<div layout:fragment="content">

		<div class="min-h-[70vh] bg-[#ffffff] py-6">
			<div class="mx-auto max-w-4xl px-4">

				<!-- 상단 헤더 영역 -->
				<div class="mb-6">
					<div class="flex items-center justify-between mb-4">
						<div class="flex items-center gap-3">
							<div
								class="flex items-center justify-center w-10 h-10 rounded-full bg-[#7CBD00]/10 text-[#7CBD00]">
								<!-- 벨 아이콘 대신 이모지로 -->
								🔔
							</div>
							<h1 class="text-2xl sm:text-3xl font-bold text-gray-900">알림
							</h1>
						</div>

						<!-- 모두 읽음 버튼 (unreadCount 있을 때만) -->
						<button th:if="${unreadCount != null and unreadCount > 0}"
							type="button" onclick="markAllAsRead()"
							class="hidden sm:inline-flex items-center text-sm px-3 py-1.5 rounded-full
                                   text-[#7CBD00] hover:text-[#6BAD00] hover:bg-[#7CBD00]/10 border border-transparent
                                   transition-colors">
							<span class="mr-1.5 text-xs">✔</span> 모두 읽음
						</button>
					</div>

					<!-- 탭 (전체 / 읽지 않음) -->
					<div
						class="flex items-center gap-2 border-b border-gray-200 text-sm">

						<!-- 전체 -->
						<a th:href="@{/notifications}"
							th:class="${filter} == 'all' ?
                 'px-4 py-2 border-b-2 border-[#7CBD00] text-[#7CBD00] font-medium' :
                 'px-4 py-2 border-b-2 border-transparent text-gray-600 hover:text-gray-900'">
							전체 <span th:text="'(' + ${notifications.size()} + ')'">(0)</span>
						</a>

						<!-- 읽지 않음 -->
						<a th:href="@{/notifications/unread}"
							th:class="${filter} == 'unread' ?
                 'px-4 py-2 border-b-2 border-[#7CBD00] text-[#7CBD00] font-medium' :
                 'px-4 py-2 border-b-2 border-transparent text-gray-600 hover:text-gray-900'">
							읽지 않음 <span th:text="'(' + ${unreadCount} + ')'"
							th:if="${unreadCount != null}">(0)</span>
						</a>
					</div>
				</div>

				<!-- 알림 리스트 카드 -->
				<div class="space-y-4">

					<!-- 알림이 없을 때 -->
					<div th:if="${#lists.isEmpty(notifications)}"
						class="bg-white rounded-lg border border-gray-200 p-12 text-center">
						<div
							class="mx-auto mb-4 flex items-center justify-center w-12 h-12 rounded-full bg-gray-100 text-gray-300 text-2xl">
							🔔</div>
						<p class="text-sm text-gray-500"
							th:text="${filter} == 'unread' ? '읽지 않은 알림이 없습니다' : '알림이 없습니다'">
							알림이 없습니다</p>
					</div>

					<!-- 알림이 있을 때 -->
					<div th:if="${!#lists.isEmpty(notifications)}">

						<div th:each="n : ${notifications}"
							th:if="${filter} == 'unread' ? ${n.isRead} == 'N' : true"
							th:class="${n.isRead} == 'Y' ?
                   'bg-white rounded-lg border border-gray-200 transition-all hover:shadow-md' :
                   'bg-[#f5f5f5] rounded-lg border border-gray-300 transition-all hover:shadow-md'">

							<div class="p-4 sm:p-5">
								<div class="flex items-start gap-4">

									<!-- 아이콘 원 배경도 톤 차이 -->
									<div
										th:class="${n.isRead} == 'Y' ?
                               'flex-shrink-0 w-11 h-11 rounded-full bg-gray-100 flex items-center justify-center' :
                               'flex-shrink-0 w-11 h-11 rounded-full bg-gray-200 flex items-center justify-center'">
										<span
											th:class="${n.isRead} == 'Y' ?
                                    'text-gray-400' : 'text-gray-700 text-lg'">⏰</span>
									</div>

									<!-- 내용 영역 -->
									<div class="flex-1 min-w-0">

										<!-- 제목 + 우측 아이콘들 -->
										<div class="flex items-start justify-between gap-2 mb-2">
											<h3 th:text="${n.notificationTitle}"
												th:class="${n.isRead == 'Y'} ?
                                                  'text-base font-semibold text-gray-700' :
                                                  'text-base font-semibold text-gray-900'">
												알림 제목</h3>

											<div
												class="flex items-center gap-2 flex-shrink-0 text-gray-400">
												<!-- 읽지 않았을 때만 '읽음' 버튼 노출 -->
												<button type="button" th:if="${n.isRead == 'N'}"
													class="hidden text-xs sm:inline-flex items-center hover:text-[#7CBD00]">
													✔</button>
												<!-- 삭제 아이콘 자리 -->
												<button type="button"
													class="hidden text-xs sm:inline-flex items-center hover:text-red-500">
													🗑</button>
											</div>
										</div>

										<!-- 메시지 -->
										<p th:text="${n.notificationMessage}"
											th:class="${n.isRead == 'Y'} ?
                                             'text-sm mb-2 text-gray-500' :
                                             'text-sm mb-2 text-gray-700'">
											알림 내용</p>

										<!-- 경매 제목 / 이동 링크 + 시간  -->
										<div
											class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1">
											<div>
												<a th:if="${n.targetUrl != null}"
													th:href="@{${n.targetUrl}}"
													class="inline-block text-sm text-[#7CBD00] hover:text-[#6BAD00] font-medium hover:underline">
													관련 페이지로 이동 → </a> <span th:if="${n.targetUrl == null}"
													class="text-xs text-gray-400"> 이동 가능한 페이지가 없습니다 </span>
											</div>

											<p class="text-xs text-gray-400"
												th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd HH:mm')}">
												2026-03-30 14:00</p>
										</div>

									</div>
								</div>
							</div>
						</div>

					</div>

				</div>
			</div>

			<script th:inline="javascript">
				/* 간단 예시: 모두 읽음 호출용 (원하면 AJAX로 구현) */
				function markAllAsRead() {
					// TODO: /mypage/notifications/read-all 로 AJAX POST 날리기
					// 일단은 페이지 리로드만
					location.reload();
				}
			</script>

		</div>
</body>
</html>
