<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 승인 중</title>
  <script src="https://js.tosspayments.com/v1/payment"></script>
  <script src="/js/payment.js"></script>

  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f8f9fa;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #0064ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    h2 {
      color: #333;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="spinner"></div>
    <h2>결제 승인 중입니다</h2>
    <p>안전한 결제 처리를 위해 잠시만 기다려 주세요.<br>페이지를 새로고침하거나 닫지 마세요.</p>
  </div>

</body>

</html>
