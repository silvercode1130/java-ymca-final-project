<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>경매 리스트</title>
</head>
<body>

<div class="list-header">
    <h2>전체 경매 리스트</h2>
    
    <!-- 검색/카테고리 필터 -->
	<div style="margin-bottom:16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
	    <!-- 카테고리 필터 -->
	    <form th:action="@{/auctions}" method="get" style="display:inline;">
	        <select name="categoryIdx" onchange="this.form.submit()">
	            <option value="">전체 카테고리</option>
	            <option value="1" th:selected="${categoryIdx == 1}">공/볼</option>
	            <option value="2" th:selected="${categoryIdx == 2}">라켓/배트/클럽</option>
	            <option value="3" th:selected="${categoryIdx == 3}">보호대/보호장비</option>
	            <option value="4" th:selected="${categoryIdx == 4}">의류/신발</option>
	            <option value="5" th:selected="${categoryIdx == 5}">헬스/홈트 용품</option>
	            <option value="6" th:selected="${categoryIdx == 6}">아웃도어/캠핑 스포츠</option>
	            <option value="7" th:selected="${categoryIdx == 7}">수영/수상 스포츠 용품</option>
	            <option value="8" th:selected="${categoryIdx == 8}">액세서리/잡화</option>
	        </select>
	    </form>
	
	    <!-- 키워드 검색 -->
	    <form th:action="@{/auctions}" method="get" style="display:flex; gap:6px;">
	        <input type="text" name="keyword"
	               th:value="${keyword}"
	               placeholder="제목 또는 카테고리 검색"
	               style="padding:6px 10px; border:1px solid #ddd; border-radius:4px;">
	        <button type="submit" style="padding:6px 12px;">검색</button>
	    </form>
	
	    <!-- 전체 보기 -->
	    <a th:href="@{/auctions}" style="font-size:13px; color:gray;">전체 보기</a>
	</div>
	    
    <div th:if="${session.loginUser != null}">
        <button th:onclick="|location.href='@{/auctions/new}'|" class="btn-primary">
            🚀 구매 요청하기
        </button>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>경매번호</th>
            <th>상태</th>
            <th>카테고리</th>
            <th>이미지</th>
            <th>경매 제목</th>
            <th>구매자 희망가</th>
            <th>최저 제안가</th>
            <th>제안수</th>
            <th>남은시간</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="item : ${auctionList}"
            th:onclick="|location.href='/auctions/${item.auctionIdx}'|"
            th:style="${item.auctionStatusIdx != 1} ? 'opacity:0.6;' : ''">

            <td th:text="${item.auctionIdx}">1</td>

            <!-- 상태 배지 -->
            <td>
                <span th:if="${item.auctionStatusIdx == 1}">진행중</span>
                <span th:if="${item.auctionStatusIdx == 2}">마감</span>
                <span th:if="${item.auctionStatusIdx == 3}">유찰</span>
                <span th:if="${item.auctionStatusIdx == 4}">취소</span>
            </td>

            <td th:text="${item.itemCategoryName}">헬스/홈트</td>
			<td>
				<div style="width: 50px; height: 50px; overflow: hidden; border-radius: 4px;">
				    <img th:if="${item.auctionThumbnailImg != null and item.auctionThumbnailImg != ''}"
				         th:src="${item.auctionThumbnailImg}" alt="썸네일" style="width: 100%; height: 100%; object-fit: cover;">
				    <span th:unless="${item.auctionThumbnailImg != null or item.auctionThumbnailImg == ''}">없음</span>
				</div>
			</td>
            <td th:text="${item.auctionTitle}">제목</td>
            <td th:text="${#numbers.formatInteger(item.auctionTargetPrice, 0, 'COMMA') + '원'}">50,000원</td>
            <td class="price"
                th:text="${item.minBidPrice == 0 ? '제안 없음' : #numbers.formatInteger(item.minBidPrice, 0, 'COMMA') + '원'}">
                42,000원
            </td>
            <td th:text="${item.bidCount + '건'}">2건</td>
            <td th:text="${item.timeDisplay}">3일 남음</td>
        </tr>

        <tr th:if="${#lists.isEmpty(auctionList)}">
            <td colspan="10">조회된 경매 데이터가 없습니다.</td>
        </tr>
    </tbody>
</table>
</body>
</html>
