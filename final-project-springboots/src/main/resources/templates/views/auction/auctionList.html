<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>경매 리스트</title>
</head>
<body>

<div class="list-header">
    <h2>전체 경매 리스트</h2>

    <div>
		
		<!-- 상태 필터 탭 (진행중 / 마감된 경매) -->
		<div>
		
		    <a th:href="${selectedCategory != null}
		                ? @{/auctions/category/{cat}(cat=${selectedCategory}, sortBy=${sortBy}, statusFilter='open')}
		                : @{/auctions(sortBy=${sortBy}, statusFilter='open')}"
		       th:classappend="${statusFilter == 'open' or statusFilter == null} ? ' active-status' : ''">
		        🟢 진행중
		    </a>
		
		    <a th:href="${selectedCategory != null}
		                ? @{/auctions/category/{cat}(cat=${selectedCategory}, sortBy=${sortBy}, statusFilter='closed')}
		                : @{/auctions(sortBy=${sortBy}, statusFilter='closed')}"
		       th:classappend="${statusFilter == 'closed'} ? ' active-status' : ''">
		        🔒 마감된 경매
		    </a>
		
		</div>
		
        <!-- 카테고리 필터: 클릭하면 /auctions/{code} 로 이동 -->
        <div>
            <a th:href="@{/auctions(sortBy=${sortBy}, statusFilter=${statusFilter})}"
               th:classappend="${selectedCategory == null} ? ' active-category' : ''">
               전체
            </a>
            <a th:href="@{/auctions/category/ball(sortBy=${sortBy}, statusFilter=${statusFilter})}"
               th:classappend="${selectedCategory == 'ball'} ? ' active-category' : ''">
               공/볼
            </a>
            <a th:href="@{/auctions/category/racket(sortBy=${sortBy}, statusFilter=${statusFilter})}"
               th:classappend="${selectedCategory == 'racket'} ? ' active-category' : ''">
               라켓/배트/클럽
            </a>
            <a th:href="@{/auctions/category/protective(sortBy=${sortBy}, statusFilter=${statusFilter})}"
               th:classappend="${selectedCategory == 'protective'} ? ' active-category' : ''">
               보호대/보호장비
            </a>
            <a th:href="@{/auctions/category/apparel(sortBy=${sortBy}, statusFilter=${statusFilter})}"
               th:classappend="${selectedCategory == 'apparel'} ? ' active-category' : ''">
               의류/신발
            </a>
            <a th:href="@{/auctions/category/fitness(sortBy=${sortBy}, statusFilter=${statusFilter})}"
               th:classappend="${selectedCategory == 'fitness'} ? ' active-category' : ''">
               헬스/홈트 용품
            </a>
            <a th:href="@{/auctions/category/outdoor(sortBy=${sortBy}, statusFilter=${statusFilter})}"
               th:classappend="${selectedCategory == 'outdoor'} ? ' active-category' : ''">
               아웃도어/캠핑
            </a>
            <a th:href="@{/auctions/category/swim(sortBy=${sortBy}, statusFilter=${statusFilter})}"
               th:classappend="${selectedCategory == 'swim'} ? ' active-category' : ''">
               수영/수상 스포츠
            </a>
            <a th:href="@{/auctions/category/accessory(sortBy=${sortBy}, statusFilter=${statusFilter})}"
               th:classappend="${selectedCategory == 'accessory'} ? ' active-category' : ''">
               액세서리/잡화
            </a>
        </div>

        <!-- 키워드 검색 -->
        <form th:action="${selectedCategory != null} ? @{/auctions/{cat}(cat=${selectedCategory})} : @{/auctions}"
              method="get">
            <input type="hidden" name="sortBy"       th:value="${sortBy}">
    		<input type="hidden" name="statusFilter" th:value="${statusFilter}">
            <input type="text" name="keyword"
                   th:value="${keyword}"
                   placeholder="제목 검색">
            <button type="submit">검색</button>
        </form>
        
        <!-- 정렬 버튼 -->
		<div>
		    <a th:href="${selectedCategory != null}
		                ? @{/auctions/category/{cat}(cat=${selectedCategory}, sortBy='latest', keyword=${keyword}, statusFilter=${statusFilter})}
		                : @{/auctions(sortBy='latest', keyword=${keyword}, statusFilter=${statusFilter})}"
		       th:classappend="${sortBy == 'latest' or sortBy == null} ? ' active-sort' : ''">
		        📅 최신순
		    </a>
		
		    <a th:href="${selectedCategory != null}
		                ? @{/auctions/category/{cat}(cat=${selectedCategory}, sortBy='views', keyword=${keyword}, statusFilter=${statusFilter})}
		                : @{/auctions(sortBy='views', keyword=${keyword}, statusFilter=${statusFilter})}"
		       th:classappend="${sortBy == 'views'} ? ' active-sort' : ''">
		        👀 조회수순
		    </a>
		
		    <a th:href="${selectedCategory != null}
		                ? @{/auctions/category/{cat}(cat=${selectedCategory}, sortBy='deadline', keyword=${keyword}, statusFilter=${statusFilter})}
		                : @{/auctions(sortBy='deadline', keyword=${keyword}, statusFilter=${statusFilter})}"
		       th:classappend="${sortBy == 'deadline'} ? ' active-sort' : ''">
		        ⏰ 마감임박순
		    </a>
		</div>
    </div>

    <div th:if="${session.loginUser != null}">
        <button th:onclick="|location.href='@{/auctions/new}'|" class="btn-primary">
            🚀 구매 요청하기
        </button>
    </div>
</div>

<!-- 에러/성공 메시지 - 보이지 않는 hidden 요소로 메시지 전달 -->
<span th:if="${successMessage}" id="toast-success"
      th:data-msg="${successMessage}"></span>
<span th:if="${errorMessage}"   id="toast-error"
      th:data-msg="${errorMessage}"></span>

<table>
    <thead>
        <tr>
            <th>경매번호</th>
            <th>상태</th>
            <th>카테고리</th>
            <th>이미지</th>
            <th>경매 제목</th>
            <th>구매자 희망가</th>
            <th>최저 제안가</th>
            <th>제안수</th>
            <th>남은시간</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="item, st : ${auctionList}"
            th:onclick="|location.href='/auctions/${item.auctionIdx}'|"
            th:style="${item.auctionStatusIdx != 1} ? 'opacity:0.6; cursor:pointer;' : 'cursor:pointer;'">

            <td th:text="${st.count}">1</td>

            <td>
                <span th:if="${item.auctionStatusIdx == 1}">진행중</span>
                <span th:if="${item.auctionStatusIdx == 2}">결정대기</span>
                <span th:if="${item.auctionStatusIdx == 3}">마감</span>
                <span th:if="${item.auctionStatusIdx == 4}">유찰</span>
                <span th:if="${item.auctionStatusIdx == 5}">취소</span>
            </td>

            <td th:text="${item.itemCategoryName}">헬스/홈트</td>
            <td>
			    <div>
			        <img th:src="${item.auctionThumbnailImg != null and item.auctionThumbnailImg != ''
			                       ? item.auctionThumbnailImg
			                       : '/images/auction/auction_default.png'}"
			             alt="썸네일">
			    </div>
			</td>
            <td th:text="${item.auctionTitle}">제목</td>
            <td th:text="${#numbers.formatInteger(item.auctionTargetPrice, 0, 'COMMA') + '원'}">50,000원</td>
            <td class="price"
                th:text="${item.minBidPrice == 0 ? '제안 없음' : #numbers.formatInteger(item.minBidPrice, 0, 'COMMA') + '원'}">
                42,000원
            </td>
            <td th:text="${item.bidCount + '건'}">2건</td>
            <td class="timer-display"
			    th:data-status="${item.auctionStatusIdx}"
			    th:data-end="${item.auctionEndAt}"
			    th:data-deadline="${item.auctionDecisionDeadline}">
			    [[${item.timeDisplay}]]
			</td>
        </tr>

        <tr th:if="${#lists.isEmpty(auctionList)}">
            <td colspan="9">조회된 경매 데이터가 없습니다.</td>
        </tr>
    </tbody>
</table>
<script src="/js/auctionList.js"></script>
<script src="/js/toast.js"></script>
</body>
</html>
